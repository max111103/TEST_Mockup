    // 関連番号から在庫一覧の棚番号と仕切価格を取得する関数
    function getZaikoInfoByKanrenBangou(kanrenBangou) {
      // registeredData内で管理番号と関連番号が一致し、在庫ステータスが「販売中」のデータを探す
      if (!registeredData || registeredData.length === 0) {
        return null;
      }
      
      // 管理番号が一致し、販売中のデータを探す
      const matchedItem = registeredData.find(item => {
        return item.管理番号 && 
               item.管理番号.toString() === kanrenBangou.toString() && 
               item.在庫ステータス === '販売中';
      });
      
      // 一致したアイテムが見つかれば、棚番号、仕入価格、商品番号を返す
      if (matchedItem) {
        return {
          棚番号: matchedItem.棚番号 || '',
          仕切価格: matchedItem.仕入価格 || '',
          商品番号: matchedItem.商品番号 || ''
        };
      }
      
      return null;
    }
    
    // FIFO方式で在庫を引き当てる関数
    function allocateStockFIFO(sku, hitsuyoSu) {
      // 該当SKUの検品OKデータを取得し、入荷日でソート（古い順）
      const kenpinOkData = kenpinData.filter(k => k.ステータス === '検品OK' && k.SKU === sku);
      
      // 荷物番号ごとにグループ化し、入荷日でソート
      const zaikoByNimotsu = new Map();
      
      kenpinOkData.forEach(kenpin => {
        const registeredItem = registeredData.find(d => 
          d.SKU === kenpin.SKU && d.荷物番号 === kenpin.荷物番号
        );
        
        if (registeredItem) {
          const key = `${kenpin.SKU}_${kenpin.荷物番号}`;
          if (!zaikoByNimotsu.has(key)) {
            zaikoByNimotsu.set(key, {
              SKU: kenpin.SKU,
              荷物番号: kenpin.荷物番号,
              入荷日: registeredItem.登録日時,
              在庫数: 0,
              引当済数: calculateHikiateForItem(kenpin.SKU, kenpin.荷物番号)
            });
          }
          zaikoByNimotsu.get(key).在庫数++;
        }
      });
      
      // 入荷日でソート（古い順）
      const sortedZaiko = Array.from(zaikoByNimotsu.values()).sort((a, b) => {
        return new Date(a.入荷日) - new Date(b.入荷日);
      });
      
      // FIFO方式で引き当て
      let zanHitsuyoSu = hitsuyoSu;
      const allocationResult = [];
      
      for (const zaiko of sortedZaiko) {
        if (zanHitsuyoSu <= 0) break;
        
        // 有効在庫数を計算
        const yukoZaikoSu = zaiko.在庫数 - zaiko.引当済数;
        
        if (yukoZaikoSu > 0) {
          // 引き当て可能数を計算
          const hikiateSu = Math.min(yukoZaikoSu, zanHitsuyoSu);
          
          allocationResult.push({
            SKU: zaiko.SKU,
            荷物番号: zaiko.荷物番号,
            引当数: hikiateSu,
            入荷日: zaiko.入荷日
          });
          
          // 引当情報を更新
          const key = `${zaiko.SKU}_${zaiko.荷物番号}`;
          const currentHikiate = hikiateInfo.get(key) || 0;
          hikiateInfo.set(key, currentHikiate + hikiateSu);
          
          zanHitsuyoSu -= hikiateSu;
        }
      }
      
      return {
        success: zanHitsuyoSu <= 0,
        allocated: hitsuyoSu - zanHitsuyoSu,
        shortage: zanHitsuyoSu,
        details: allocationResult
      };
    }
    
    // データ登録機能
    function registerShukkaData(platformId) {
      const tbody = document.getElementById('data-grid-body-shukka');
      const rows = tbody.querySelectorAll('tr');
      
      if (rows.length === 0) {
        alert('登録するデータがありません');
        return;
      }
      
      // プラットフォームIDがない場合は現在の設定値を使用
      const platform = platformId || currentTorokPlatform || 'garagesale';
      
      // 在庫チェック
      const insufficientItems = [];
      const rowsData = [];
      
      rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        
        // ヤフオク用の処理（5列）
        if (platform === 'yahoo' && cells.length === 5) {
          const orderId = cells[0].textContent.trim();
          const orderTime = cells[1].textContent.trim();
          const unitPrice = cells[2].textContent.trim();
          const title = cells[3].textContent.trim();
          const skuCode = cells[4].textContent.trim(); // SkuCode = 管理番号
          
          // SkuCodeで在庫一覧から品番、棚番号、仕切価格を取得
          const zaikoInfo = getZaikoInfoByKanrenBangou(skuCode);
          
          const rowData = {
            注文ID: orderId,
            注文日次: orderTime,
            販売単価: unitPrice,
            製品名: title,
            管理番号: skuCode,
            品番: zaikoInfo ? zaikoInfo.商品番号 : '',
            棚番: zaikoInfo ? zaikoInfo.棚番号 : '',
            仕切: zaikoInfo ? zaikoInfo.仕切価格 : '',
            出荷先コード: '',
            商品名: title,
            商品番号: zaikoInfo ? zaikoInfo.商品番号 : '',
            SKU: skuCode,
            個数: '1',
            登録日時: new Date().toLocaleString('ja-JP'),
            ステータス: '出荷予定',
            プラットフォーム: platform
          };
          
          console.log('Yahoo rowData:', rowData);
          rowsData.push(rowData);
        } else if (cells.length >= 16) {
          const shukkaKanriBangou = row.getAttribute('data-shukka-bangou') || cells[1].textContent.trim();
          const sku = cells[9].textContent.trim();
          const kosu = parseInt(cells[10].textContent.trim()) || 0;
          
          // 現在の在庫数を取得
          const kenpinOkData = kenpinData.filter(k => k.ステータス === '検品OK' && k.SKU === sku);
          const zaikoSu = kenpinOkData.length;
          
          // 現在の引当数を取得
          const genzaiHikiatesu = calculateHikiateForItem(sku);
          
          // 有効在庫数を計算
          const yukoZaikoSu = zaikoSu - genzaiHikiatesu;
          
          // 在庫不足チェック
          if (yukoZaikoSu < kosu) {
            insufficientItems.push({
              sku: sku,
              shohinMei: cells[7].textContent.trim(),
              hitsuyoSu: kosu,
              yukoZaikoSu: yukoZaikoSu
            });
          }
          
          // 関連番号項目を取得（cells[1]）- 「（なし）」表示の場合は空文字として扱う
          let kanrenBangou = cells[1].textContent.trim();
          if (kanrenBangou === '（なし）') {
            kanrenBangou = '';
          }
          
          rowsData.push({
            取引先コード: cells[0].textContent.trim(),
            関連番号項目: kanrenBangou,
            出荷先コード: cells[0].textContent.trim(),
            品番: cells[2].textContent.trim(),
            製品名: cells[3].textContent.trim(),
            出荷予定数: cells[4].textContent.trim(),
            販売単価: cells[5].textContent.trim(),
            発送方法: cells[6].textContent.trim(),
            サイズ: cells[7].textContent.trim(),
            送料: cells[8].textContent.trim(),
            ポイント利用分: cells[9].textContent.trim(),
            購入者名: cells[10].textContent.trim(),
            会員ID: cells[11].textContent.trim(),
            郵便番号: cells[12].textContent.trim(),
            都道府県: cells[13].textContent.trim(),
            市区町村: cells[14].textContent.trim(),
            番地建物名: cells[15].textContent.trim(),
            電話番号: cells[16] ? cells[16].textContent.trim() : '',
            出荷管理番号: shukkaKanriBangou,
            商品名: cells[3].textContent.trim(),
            商品番号: cells[2].textContent.trim(),
            SKU: sku,
            個数: cells[4].textContent.trim(),
            登録日時: new Date().toLocaleString('ja-JP'),
            ステータス: '出荷予定',
            棚番: '',
            仕切: '',
            プラットフォーム: platform
          });
        }
      });
      
      // 在庫不足がある場合は警告
      if (insufficientItems.length > 0) {
        let message = '以下の商品で在庫が不足しています:\n\n';
        insufficientItems.forEach(item => {
          message += `SKU: ${item.sku} (${item.shohinMei})\n`;
          message += `  必要数: ${item.hitsuyoSu}, 有効在庫数: ${item.yukoZaikoSu}\n\n`;
        });
        message += '登録を続行しますか?';
        
        if (!confirm(message)) {
          return;
        }
      }
      
      // データ登録処理のシミュレーション
      const confirmResult = confirm(`${rows.length}件のデータを登録し、在庫を引き当てます。よろしいですか?`);
      
      if (confirmResult) {
        // FIFO方式で在庫引き当てを実行
        const allocationResults = [];
        
        rowsData.forEach(rowData => {
          // ヤフオク用データはスキップ
          if (platform !== 'yahoo') {
            const result = allocateStockFIFO(rowData.SKU, parseInt(rowData.個数));
            allocationResults.push({
              sku: rowData.SKU,
              shohinMei: rowData.商品名,
              result: result
            });
          }
        });
        
        // データをグローバル配列に保存
        rowsData.forEach(rowData => {
          // ヤフオク用データはスキップ（既に品番、棚番、仕切が設定済み）
          if (platform !== 'yahoo') {
            // 関連番号項目から在庫一覧の「販売中」データの棚番号、仕切価格、商品番号を取得
            const zaikoInfo = getZaikoInfoByKanrenBangou(rowData.関連番号項目);
            if (zaikoInfo) {
              rowData.棚番 = zaikoInfo.棚番号;
              rowData.仕切 = zaikoInfo.仕切価格;
              rowData.品番 = zaikoInfo.商品番号;  // 在庫一覧の商品番号を品番として設定
            }
          }
          shukkaYoteiData.push(rowData);
        });
        
        // 引き当て結果のメッセージを作成
        let allocationMessage = `${rows.length}件のデータを登録しました\n`;
        if (platform !== 'yahoo') {
          allocationMessage += `\n【引き当て詳細（FIFO順）】\n`;
          allocationResults.forEach(item => {
            allocationMessage += `\nSKU: ${item.sku} (${item.shohinMei})\n`;
            if (item.result.details.length > 0) {
              item.result.details.forEach(detail => {
                allocationMessage += `  荷物番号: ${detail.荷物番号} → ${detail.引当数}個 (入荷日: ${detail.入荷日})\n`;
              });
            }
            if (item.result.shortage > 0) {
              allocationMessage += `  ⚠ 不足: ${item.result.shortage}個\n`;
            }
          });
        }
        
        // ここで実際のデータベース登録処理を行う
        // 現在はシミュレーションとしてアラートを表示
        setTimeout(() => {
          alert(allocationMessage);
          
          // 在庫一覧の在庫数を更新する処理
          rowsData.forEach(rowData => {
            const sku = rowData.SKU;
            // 在庫一覧データから該当するSKUの商品を探す
            const zaikoItem = zaikoDataArray.find(item => item.SKU === sku);
            if (zaikoItem) {
              // 在庫数: 0、引当数: 1、行こう在庫数: 0に設定
              zaikoItem.在庫数 = 0;
              zaikoItem.引当数 = 1;
              zaikoItem.行こう在庫数 = 0;
            }
          });
          
          // データをクリア
          tbody.innerHTML = `

                <div class="flex flex-col items-center justify-center text-gray-500">

    // CSVエクスポート機能
    function exportShukkaCSV() {
      const table = document.querySelector('#data-grid-body-shukka').closest('table');
      const rows = table.querySelectorAll('tbody tr:not(#no-data-message-shukka)');
      
      if (rows.length === 0) {
        alert('エクスポートするデータがありません');
        return;
      }
      
      let csv = '取引先コード,出荷指示日,出荷先名称,出荷先住所,出荷先郵便番号,出荷先電話番号,商品名,商品番号,SKU,個数,オプション1,オプション2,オプション3,オプション4,オプション5\n';
      
      rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        const rowData = [];
        for (let i = 0; i < cells.length; i++) {
          rowData.push(cells[i].textContent.trim());
        }
        csv += rowData.join(',') + '\n';
      });
      
      // BOMを追加してExcelで文字化けを防ぐ
      const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
      const blob = new Blob([bom, csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      
      link.setAttribute('href', url);
      link.setAttribute('download', '出荷予定登録_' + new Date().toISOString().slice(0, 10) + '.csv');
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // モーダルからのCSVインポート
    function importLocationFromModal() {
      const fileInput = document.getElementById('csv-file-input-modal');
      const file = fileInput.files[0];
      if (!file) {
        alert('CSVファイルを選択してください');
        return;
      }
      
      // 選択された倉庫を取得
      const selectedWarehouse = document.querySelector('input[name="warehouse-select"]:checked').value;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        const text = e.target.result;
        // パースしてプレビューを表示
        parseLocationCSVForPreview(text, selectedWarehouse);
      };
      reader.readAsText(file, 'UTF-8');
    }
    
    // ロケーションCSVをパースしてプレビュー表示
    function parseLocationCSVForPreview(text, selectedWarehouse) {
      const lines = text.split('\n');
      const importData = [];
      let skippedCount = 0;
      
      // ヘッダー行をスキップして2行目から処理
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line) {
          const columns = line.split(',');
          if (columns.length >= 1) {
            const shelfNum = columns[0]?.trim() || '';
            const shelfName = columns[1]?.trim() || '';
            const sortOrder = columns[2]?.trim() || '';
            const shelfType = columns[3]?.trim() || '';
            const area = columns[4]?.trim() || '';
            const group = columns[5]?.trim() || '';
            const col = columns[6]?.trim() || '';
            const row = columns[7]?.trim() || '';
            const width = columns[8]?.trim() || '';
            
            // 必須フィールドのチェック
            if (!shelfNum) {
              skippedCount++;
              continue;
            }
            
            // 重複チェック（同じ棚番号）
            if (locationMasterData.some(d => d.棚番号 === shelfNum)) {
              skippedCount++;
              continue;
            }
            
            importData.push({
              倉庫: selectedWarehouse,
              ロケーションコード: area,
              棚番号: shelfNum,
              棚名称: shelfName,
              棚ソート順: sortOrder ? parseInt(sortOrder) : null,
              棚タイプ: shelfType,
              エリア: area,
              グループ: group,
              列: col,
              段: row,
              間口: width,
              ステータス: '使用可能',
              登録日時: new Date().toLocaleString('ja-JP')
            });
          } else {
            skippedCount++;
          }
        }
      }
      
      if (importData.length === 0) {
        alert('インポート可能なデータがありません');
        return;
      }
      
      // プレビュー画面を表示
      showLocationImportPreview(importData, selectedWarehouse, skippedCount);
    }

    function exportLocationCSV() {
      if (locationMasterData.length === 0) {

        return;
      }
      
      let csv = '倉庫,棚番号,ステータス,備考,登録日時\n';
      
      locationMasterData.forEach(data => {
        csv += `${data.倉庫},${data.棚番号},${data.ステータス},"${data.備考 || ''}",${data.登録日時}\n`;
      });
      
      const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
      const blob = new Blob([bom, csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      
      link.setAttribute('href', url);
      link.setAttribute('download', 'ロケーションマスタ_' + new Date().toISOString().slice(0, 10) + '.csv');
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
    
    // CSV解析とロケーションデータへの追加
    function parseLocationCSV(text, selectedWarehouse = 'Z') {
      const lines = text.split('\n');
      let importedCount = 0;
      let skippedCount = 0;
      
      // ヘッダー行をスキップして2行目から処理
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line) {
          const columns = line.split(',');  // カンマ区切り
          if (columns.length >= 1) {
            const shelfNum = columns[0]?.trim() || '';           // 棚番号
            const shelfName = columns[1]?.trim() || '';          // 棚名称(capa)
            const sortOrder = columns[2]?.trim() || '';          // 棚ソート順
            const shelfType = columns[3]?.trim() || '';          // 棚タイプ
            const area = columns[4]?.trim() || '';               // エリア
            const group = columns[5]?.trim() || '';              // グループ
            const col = columns[6]?.trim() || '';                // 列
            const row = columns[7]?.trim() || '';                // 段
            const width = columns[8]?.trim() || '';              // 間口
            
            // 必須フィールドのチェック
            if (!shelfNum) {
              skippedCount++;
              continue;
            }
            
            // 重複チェック（同じ棚番号）
            if (locationMasterData.some(d => d.棚番号 === shelfNum)) {
              skippedCount++;
              continue;
            }
            
            locationMasterData.push({
              倉庫: selectedWarehouse,
              ロケーションコード: area,
              棚番号: shelfNum,
              棚名称: shelfName,
              棚ソート順: sortOrder ? parseInt(sortOrder) : null,
              棚タイプ: shelfType,
              エリア: area,
              グループ: group,
              列: col,
              段: row,
              間口: width,
              ステータス: '使用可能',
              登録日時: new Date().toLocaleString('ja-JP')
            });
            
            importedCount++;
          } else {
            skippedCount++;
          }
        }
      }
      
      displayLocationData();
      
      // 結果メッセージ
      if (importedCount > 0) {
        showNotification(`${importedCount}件のロケーションを${selectedWarehouse}倉庫にインポートしました${skippedCount > 0 ? `（${skippedCount}件スキップ）` : ''}`, 'success');
      } else {
        showNotification('インポート可能なデータがありませんでした', 'warning');
      }
    }

    // ピッキングリストをPDF印刷する関数
    function printPickingListPDF() {
      const pickingTargets = shukkaYoteiData.filter(data => data.ステータス === '出荷予定');
      
      if (pickingTargets.length === 0) {
        alert('印刷するピッキング対象データがありません');
        return;
      }
      
      // jsPDFのインスタンスを作成
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({
        orientation: 'landscape',
        unit: 'mm',
        format: 'a4'
      });
      
      // 日本語フォント対応（Courier Newを使用）
      doc.setFont('courier', 'normal');
      
      // タイトル
      doc.setFontSize(18);
      doc.text('ピッキングリスト', 148, 15, { align: 'center' });
      
      // 日付
      const today = new Date().toLocaleDateString('ja-JP');
      doc.setFontSize(10);
      doc.text('日付: ' + today, 14, 25);
      
      // テーブルデータの準備
      const tableData = [];
      pickingTargets.forEach(data => {
        // 該当SKUの棚番号を取得
        const kenpinOkItems = kenpinData.filter(k => k.ステータス === '検品OK' && k.SKU === data.SKU);
        const tanaBangou = kenpinOkItems.length > 0 ? kenpinOkItems[0].棚番号 : '-';
        
        const requiredCount = parseInt(data.個数) || 0;
        
        tableData.push([
          data.出荷管理番号 || '',
          data.商品名 || '',
          data.商品番号 || '',
          data.SKU || '',
          tanaBangou,
          requiredCount.toString()
        ]);
      });
      
      // テーブルの作成（autoTableプラグインを使用）
      try {
        doc.autoTable({
          startY: 30,
          head: [['出荷管理番号', '商品名', '商品番号', 'SKU', '棚番号', '必要数']],
          body: tableData,
          styles: {
            fontSize: 9,
            cellPadding: 3,
            overflow: 'linebreak',
            halign: 'center'
          },
          headStyles: {
            fillColor: [66, 66, 66],
            textColor: 255,
            fontStyle: 'bold',
            halign: 'center'
          },
          columnStyles: {
            0: { cellWidth: 40 },
            1: { cellWidth: 50 },
            2: { cellWidth: 35 },
            3: { cellWidth: 25 },
            4: { cellWidth: 25 },
            5: { cellWidth: 20 }
          },
          alternateRowStyles: {
            fillColor: [245, 245, 245]
          },
          margin: { left: 14, right: 14 }
        });
      } catch(e) {
        console.error('テーブル作成エラー:', e);
      }
      
      // フッター
      const pageCount = doc.internal.getNumberOfPages();
      doc.setFontSize(8);
      for (let i = 1; i <= pageCount; i++) {
        doc.setPage(i);
        doc.text('ページ ' + i + ' / ' + pageCount, 148, 200, { align: 'center' });
        doc.text('合計件数: ' + pickingTargets.length, 14, 200);
      }
      
      // PDFを保存
      const filename = 'PickingList_' + new Date().toISOString().slice(0, 10) + '.pdf';
      doc.save(filename);
      
      // 成功メッセージを表示
      showNotification('ピッキングリストをPDF出力しました', 'success');
    }
    
    // 納品書をPDF発行する関数
    function printDeliveryNotePDF() {
      const pickingTargets = shukkaYoteiData.filter(data => data.ステータス === '出荷予定');
      
      if (pickingTargets.length === 0) {
        alert('発行する納品書データがありません');
        return;
      }
      
      // 出荷先ごとにグループ化
      const groupedByDestination = new Map();
      pickingTargets.forEach(data => {
        const destination = data.出荷先名称 || '不明';
        if (!groupedByDestination.has(destination)) {
          groupedByDestination.set(destination, []);
        }
        groupedByDestination.get(destination).push(data);
      });
      
      // jsPDFのインスタンスを作成
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({
        orientation: 'portrait',
        unit: 'mm',
        format: 'a4'
      });
      
      // 日本語フォント対応
      doc.setFont('courier', 'normal');
      
      const today = new Date();
      const dateString = today.toLocaleDateString('ja-JP', { 
        year: 'numeric', 
        month: '2-digit', 
        day: '2-digit' 
      });
      
      let isFirstPage = true;
      
      // 出荷先ごとに納品書を作成
      groupedByDestination.forEach((items, destination) => {
        if (!isFirstPage) {
          doc.addPage();
        }
        isFirstPage = false;
        
        // タイトル
        doc.setFontSize(20);
        doc.text('Delivery Note', 105, 20, { align: 'center' });
        doc.setFontSize(16);
        doc.text('Nohin-sho', 105, 28, { align: 'center' });
        
        // 日付
        doc.setFontSize(10);
        doc.text('Date: ' + dateString, 150, 40);
        
        // 出荷先情報
        doc.setFontSize(12);
        doc.setFont('courier', 'bold');
        doc.text('To:', 20, 50);
        doc.setFont('courier', 'normal');
        doc.setFontSize(11);
        doc.text(destination, 20, 57);
        
        // 出荷管理番号（最初のアイテムから取得）
        if (items.length > 0 && items[0].出荷管理番号) {
          doc.setFontSize(10);
          doc.text('Order No: ' + items[0].出荷管理番号, 20, 64);
        }
        
        // 区切り線
        doc.setLineWidth(0.5);
        doc.line(20, 70, 190, 70);
        
        // テーブルデータの準備
        const tableData = [];
        let totalQuantity = 0;
        
        items.forEach((data, index) => {
          const quantity = parseInt(data.個数) || 0;
          totalQuantity += quantity;
          
          tableData.push([
            (index + 1).toString(),
            data.商品名 || '',
            data.商品番号 || '',
            data.SKU || '',
            quantity.toString()
          ]);
        });
        
        // テーブルの作成
        doc.autoTable({
          startY: 75,
          head: [['No.', 'Product Name', 'Product No.', 'SKU', 'Quantity']],
          body: tableData,
          foot: [['', '', '', 'Total:', totalQuantity.toString()]],
          styles: {
            fontSize: 10,
            cellPadding: 3,
            overflow: 'linebreak',
            halign: 'left'
          },
          headStyles: {
            fillColor: [66, 66, 66],
            textColor: 255,
            fontStyle: 'bold',
            halign: 'center'
          },
          footStyles: {
            fillColor: [240, 240, 240],
            textColor: 0,
            fontStyle: 'bold',
            halign: 'right'
          },
          columnStyles: {
            0: { cellWidth: 15, halign: 'center' },
            1: { cellWidth: 70 },
            2: { cellWidth: 35 },
            3: { cellWidth: 35 },
            4: { cellWidth: 25, halign: 'right' }
          },
          alternateRowStyles: {
            fillColor: [250, 250, 250]
          },
          margin: { left: 20, right: 20 }
        });
        
        // 最終Y位置を取得
        const finalY = doc.lastAutoTable.finalY || 150;
        
        // 備考欄
        if (finalY < 220) {
          doc.setFontSize(10);
          doc.text('Notes:', 20, finalY + 15);
          doc.setLineWidth(0.3);
          doc.line(20, finalY + 20, 190, finalY + 20);
          doc.line(20, finalY + 30, 190, finalY + 30);
          doc.line(20, finalY + 40, 190, finalY + 40);
        }
        
        // フッター
        doc.setFontSize(8);
        doc.text('Thank you for your business', 105, 280, { align: 'center' });
        doc.text('Items: ' + items.length, 20, 287);
        doc.text('Total Quantity: ' + totalQuantity, 150, 287);
      });
      
      // PDFを保存
      const filename = `DeliveryNote_${new Date().toISOString().slice(0, 10).replace(/-/g, '')}.pdf`;
      doc.save(filename);
      
      // 成功メッセージを表示
      showNotification(`納品書を${groupedByDestination.size}件発行しました`, 'success');
    }

                  <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider whitespace-nowrap">商品名</th>
                  <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider whitespace-nowrap">SKU</th>
                  <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider whitespace-nowrap">予定数</th>
                  <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider whitespace-nowrap">検品数</th>
                  <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider whitespace-nowrap">ステータス</th>
                </tr>
              </thead>
              <tbody id="shukka-kenpin-list-body" class="divide-y divide-gray-200">
                <tr>
                  <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                    注文管理番号を入力してください
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- 検品履歴 -->
        <div class="bg-white rounded-lg shadow-sm p-6 mb-6" style="margin-top: 50px;">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-gray-800">検品履歴</h2>
            <button onclick="exportShukkaKenpinCSV()" class="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors duration-200 font-medium">
              <i data-lucide="download" class="w-4 h-4"></i>
              <span>CSVエクスポート</span>
            </button>
          </div>
          <div class="overflow-x-auto" style="max-height: 300px; overflow-y: auto;">
            <table class="w-full">
              <thead class="bg-gray-50 border-b border-gray-200 sticky top-0">
                <tr>
                  <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700">検品時刻</th>
                  <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700">注文管理番号</th>
                  <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700">商品名</th>
                  <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700">SKU</th>
                  <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700">ステータス</th>
                </tr>
              </thead>
              <tbody id="shukka-kenpin-history-body" class="divide-y divide-gray-200">
                <tr>
                  <td colspan="5" class="px-4 py-8 text-center text-gray-500">
                    検品履歴がありません
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      `;
      
      // アイコンを再初期化
      lucide.createIcons();
    }

    // 注文管理番号入力処理
    function handleOrderNumberInput(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        loadOrderData();
      }
    }

    // 注文データ読み込み
    function loadOrderData() {
      const orderNumberInput = document.getElementById('order-number-input');
      const orderNumber = orderNumberInput.value.trim();
      
      if (!orderNumber) {
        alert('注文管理番号を入力してください');
        return;
      }

      // 出荷予定データから該当する注文を検索
      const orderData = shukkaYoteiData.filter(data => 
        data.出荷管理番号 === orderNumber && data.ステータス === 'ピッキング完了'
      );

      if (orderData.length === 0) {
        alert('該当する注文が見つかりません。\n※ピッキング完了済みの注文のみ検品できます。');
        return;
      }

      // 検品データを初期化
      shukkaKenpinData = orderData.map(data => ({
        注文管理番号: data.出荷管理番号,
        商品名: data.商品名,
        SKU: data.SKU,
        予定数: parseInt(data.個数) || 0,
        検品数: 0,
        ステータス: '未検品'
      }));

      // SKU入力を有効化
      document.getElementById('sku-input').disabled = false;
      document.getElementById('sku-input').focus();

      // 検品対象一覧を表示
      displayShukkaKenpinList();
      
      // 統計を更新
      updateShukkaKenpinStats();

      showNotification(`注文管理番号: ${orderNumber} を読み込みました`, 'success');
    }

    // 検品対象一覧表示
    function displayShukkaKenpinList() {
      const tbody = document.getElementById('shukka-kenpin-list-body');
      
      if (shukkaKenpinData.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="5" class="px-6 py-8 text-center text-gray-500">
              注文管理番号を入力してください
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = shukkaKenpinData.map(data => {
        const statusColor = 
          data.ステータス === '検品完了' ? 'bg-green-100 text-green-800' :
          data.ステータス === 'エラー' ? 'bg-red-100 text-red-800' :
          'bg-yellow-100 text-yellow-800';

        return `
          <tr class="${data.ステータス === '検品完了' ? 'bg-green-50' : ''}">
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${data.商品名}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-mono text-gray-900">${data.SKU}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${data.予定数}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-bold ${data.検品数 >= data.予定数 ? 'text-green-600' : 'text-blue-600'}">${data.検品数}</td>
            <td class="px-6 py-4 whitespace-nowrap">
              <span class="px-3 py-1 text-xs font-semibold rounded-full ${statusColor}">
                ${data.ステータス}
              </span>
            </td>
          </tr>
        `;
      }).join('');
    }

    // SKU入力処理
    function handleSKUInput(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        processSKUKenpin();
      }
    }

    // SKU検品処理
    function processSKUKenpin() {
      const skuInput = document.getElementById('sku-input');
      const sku = skuInput.value.trim();
      
      if (!sku) {
        return;
      }

      if (shukkaKenpinData.length === 0) {
        alert('先に注文管理番号を入力してください');
        return;
      }

      // 該当するSKUを検索
      const targetItem = shukkaKenpinData.find(data => 
        data.SKU === sku && data.ステータス !== '検品完了'
      );

      if (!targetItem) {
        // エラー: 該当なしまたは既に検品完了
        const alreadyCompleted = shukkaKenpinData.find(data => 
          data.SKU === sku && data.ステータス === '検品完了'
        );
        
        if (alreadyCompleted) {
          showNotification(`SKU: ${sku} は既に検品完了です`, 'warning');
        } else {
          showNotification(`エラー: SKU: ${sku} は注文に含まれていません`, 'error');
          
          // エラー履歴に追加
          addShukkaKenpinHistory(sku, '不明', 'エラー');
        }
        
        skuInput.value = '';
        skuInput.focus();
        return;
      }

      // 検品数を増やす
      targetItem.検品数++;

      // ステータスを更新
      if (targetItem.検品数 >= targetItem.予定数) {
        targetItem.ステータス = '検品完了';
        showNotification(`✓ ${targetItem.商品名} の検品が完了しました`, 'success');
      } else {
        targetItem.ステータス = '検品中';
        showNotification(`✓ ${targetItem.商品名} (${targetItem.検品数}/${targetItem.予定数})`, 'success');
      }

      // 検品履歴に追加
      addShukkaKenpinHistory(sku, targetItem.商品名, 'OK');

      // 一覧を更新
      displayShukkaKenpinList();
      
      // 統計を更新
      updateShukkaKenpinStats();

      // 全て検品完了したかチェック
      const allCompleted = shukkaKenpinData.every(data => data.ステータス === '検品完了');
      if (allCompleted) {
        setTimeout(() => {
          if (confirm('全ての商品の検品が完了しました。\n出荷完了処理を実行しますか?')) {
            completeShukkaKenpin();
          }
        }, 500);
      }

      // 入力をクリア
      skuInput.value = '';
      skuInput.focus();
    }

    // 検品履歴に追加
    function addShukkaKenpinHistory(sku, shohinMei, status) {
      const now = new Date();
      const timeString = now.toLocaleTimeString('ja-JP');
      const orderNumber = document.getElementById('order-number-input').value.trim();

      shukkaKenpinHistory.unshift({
        時刻: timeString,
        注文管理番号: orderNumber,
        商品名: shohinMei,
        SKU: sku,
        ステータス: status
      });

      // 履歴表示を更新
      updateShukkaKenpinHistory();
    }

    // 検品履歴表示更新
    function updateShukkaKenpinHistory() {
      const tbody = document.getElementById('shukka-kenpin-history-body');
      
      if (shukkaKenpinHistory.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="5" class="px-4 py-8 text-center text-gray-500">
              検品履歴がありません
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = shukkaKenpinHistory.slice(0, 50).map(record => {
        const statusColor = record.ステータス === 'OK' ? 'text-green-600' : 'text-red-600';
        const statusText = record.ステータス === 'OK' ? '✓ OK' : '✗ エラー';

        return `
          <tr>
            <td class="px-4 py-3 text-sm text-gray-900">${record.時刻}</td>
            <td class="px-4 py-3 text-sm font-mono text-gray-900">${record.注文管理番号}</td>
            <td class="px-4 py-3 text-sm text-gray-900">${record.商品名}</td>
            <td class="px-4 py-3 text-sm font-mono text-gray-900">${record.SKU}</td>
            <td class="px-4 py-3 text-sm font-semibold ${statusColor}">${statusText}</td>
          </tr>
        `;
      }).join('');
    }

    // 統計更新
    function updateShukkaKenpinStats() {
      const targetCount = shukkaKenpinData.reduce((sum, data) => sum + data.予定数, 0);
      const kenpinCount = shukkaKenpinData.reduce((sum, data) => sum + data.検品数, 0);
      const errorCount = shukkaKenpinHistory.filter(h => h.ステータス === 'エラー').length;

      document.getElementById('shukka-target-count').textContent = targetCount;
      document.getElementById('shukka-kenpin-count').textContent = kenpinCount;
      document.getElementById('shukka-mikenpin-count').textContent = Math.max(0, targetCount - kenpinCount);
      document.getElementById('shukka-error-count').textContent = errorCount;
    }

    // 出荷完了処理
    function completeShukkaKenpin() {
      const orderNumber = document.getElementById('order-number-input').value.trim();
      
      // 出荷予定データのステータスを更新
      shukkaYoteiData.forEach(data => {
        if (data.出荷管理番号 === orderNumber) {
          data.ステータス = '出荷完了';
          
          // 対応する在庫データのステータスを「販売済」に更新
          zaikoDataArray.forEach(zaiko => {
            if (zaiko.SKU === data.SKU) {
              // 引当数が0より大きい場合のみ販売済に変更
              if ((zaiko.引当数 || 0) > 0) {
                zaiko.在庫ステータス = '販売済';
              }
            }
          });
        }
      });

      showNotification(`注文管理番号: ${orderNumber} の出荷が完了しました`, 'success');
      
      // 画面をリセット
      clearOrderInput();
    }

    // 注文入力クリア
    function clearOrderInput() {
      document.getElementById('order-number-input').value = '';
      document.getElementById('sku-input').value = '';
      document.getElementById('sku-input').disabled = true;
      shukkaKenpinData = [];
      displayShukkaKenpinList();
      updateShukkaKenpinStats();
    }

    // SKU入力クリア
    function clearSKUInput() {
      document.getElementById('sku-input').value = '';
      document.getElementById('sku-input').focus();
    }

    // 検品履歴CSVエクスポート
    function exportShukkaKenpinCSV() {
      if (shukkaKenpinHistory.length === 0) {
        alert('エクスポートするデータがありません');
        return;
      }

      let csv = '\uFEFF'; // BOM
      csv += '検品時刻,注文管理番号,商品名,SKU,ステータス\n';

      shukkaKenpinHistory.forEach(record => {
        csv += `${record.時刻},${record.注文管理番号},${record.商品名},${record.SKU},${record.ステータス}\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.setAttribute('href', url);
      link.setAttribute('download', '出荷検品履歴_' + new Date().toISOString().slice(0, 10) + '.csv');
      link.click();

      showNotification('検品履歴をCSVエクスポートしました', 'success');
    }

    // 出荷予定一覧のチェック済みデータをクリップボードにコピー
    // コピードロップダウンのトグル
    function toggleCopyDropdown(e) {
      // イベント伝播を停止（ドキュメントクリックで閉じないように）
      if (e) {
        e.stopPropagation();
      }
      // IDで直接ドロップダウンメニューを探す
      const dropdownMenu = document.getElementById('copy-dropdown-menu');
      if (dropdownMenu) {
        dropdownMenu.classList.toggle('hidden');
      }
    }

    // ドロップダウン外をクリックした時に閉じる
    document.addEventListener('click', function(event) {
      const dropdownContainer = document.getElementById('copy-dropdown-container');
      if (dropdownContainer && !dropdownContainer.contains(event.target)) {
        const dropdownMenu = document.getElementById('copy-dropdown-menu');
        if (dropdownMenu && !dropdownMenu.classList.contains('hidden')) {
          dropdownMenu.classList.add('hidden');
        }
      }
    });

    // CSV形式でコピー（品番、棚番号、仕切価格）
    function copyShukkaDataAsCSV(typeId) {
      const checkboxes = document.querySelectorAll('.shukka-checkbox:checked');
      if (checkboxes.length === 0) {
        alert('コピーするデータを選択してください');
        return;
      }

      let copyData = [];
      checkboxes.forEach(checkbox => {
        const index = parseInt(checkbox.getAttribute('data-index'));
        const rowData = shukkaYoteiData[index];
        if (rowData && rowData.プラットフォーム === currentShukkaType) {
          // 品番,棚番号,仕切価格(税抜) の形式でコピーデータを作成
          copyData.push(`${rowData.品番},${rowData.棚番},${rowData.仕切}`);
        }
      });

      if (copyData.length === 0) {
        alert('コピー対象のデータがありません');
        return;
      }

      // クリップボードにコピー
      const clipboardText = copyData.join('\n');
      navigator.clipboard.writeText(clipboardText).then(() => {
        alert(`${copyData.length}件のデータをクリップボードにコピーしました`);
        toggleCopyDropdown(); // ドロップダウンを閉じる
      }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('クリップボードへのコピーに失敗しました');
      });
    }

    // 出荷先コードのみコピー
    function copyShukkaDataCodeOnly(typeId) {
      const checkboxes = document.querySelectorAll('.shukka-checkbox:checked');
      if (checkboxes.length === 0) {
        alert('コピーするデータを選択してください');
        return;
      }

      let copyData = [];
      checkboxes.forEach(checkbox => {
        const index = parseInt(checkbox.getAttribute('data-index'));
        const rowData = shukkaYoteiData[index];
        if (rowData && rowData.プラットフォーム === currentShukkaType) {
          // 出荷先コードのみコピー
          copyData.push(rowData.出荷先コード);
        }
      });

      if (copyData.length === 0) {
        alert('コピー対象のデータがありません');
        return;
      }

      // クリップボードにコピー
      const clipboardText = copyData.join('\n');
      navigator.clipboard.writeText(clipboardText).then(() => {
        alert(`${copyData.length}件のデータをクリップボードにコピーしました`);
        toggleCopyDropdown(); // ドロップダウンを閉じる
      }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('クリップボードへのコピーに失敗しました');
      });
    }

    // 互換性のための古い関数（呼び出しがある場合）
    function copyShukkaToClipboard(typeId) {
      copyShukkaDataAsCSV(typeId);
    }
  </script>
