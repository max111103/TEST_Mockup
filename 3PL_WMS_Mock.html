    function handleTanaResetInput(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        executeTanaReset();
      }
    }
    
    // 棚リセットを実行
    function executeTanaReset() {
      const input = document.getElementById('tana-reset-input');
      const tana = input?.value.trim();
      
      if (!tana) {
        alert('棚番号を入力してください');
        return;
      }
      
      const { selectedTanas, completedTanas, expectedStock, actualStock, errorSkus } = window.tanaoroshiState || {};
      
      // 対象棚番号に含まれているかチェック
      if (!selectedTanas || !selectedTanas.includes(tana)) {
        alert(`棚番号「${tana}」は対象棚に含まれていません`);
        return;
      }
      
      // 確認ダイアログ
      if (!confirm(`棚番号「${tana}」の進捗をリセットしますか？\n\nこの操作は取り消せません。`)) {
        return;
      }
      
      // 完了済みリストから削除
      if (completedTanas && completedTanas.includes(tana)) {
        const index = completedTanas.indexOf(tana);
        if (index > -1) {
          completedTanas.splice(index, 1);
        }
      }
      
      // 実在庫データから該当棚のデータを削除
      if (actualStock) {
        Object.keys(actualStock).forEach(sku => {
          if (actualStock[sku]?.tana === tana) {
            delete actualStock[sku];
          }
        });
      }
      
      // エラーSKUから該当棚のデータを削除
      if (errorSkus) {
        const newErrorSkus = errorSkus.filter(e => (e.棚番号 || e.tana) !== tana);
        window.tanaoroshiState.errorSkus = newErrorSkus;
      }
      
      // scannedSkusから該当棚のSKUを削除（expectedStockを参照して該当棚のSKUを特定）
      if (window.tanaoroshiState.scannedSkus && expectedStock) {
        const tanaSKUs = new Set();
        Object.keys(expectedStock).forEach(sku => {
          if (expectedStock[sku]?.棚番号 === tana) {
            tanaSKUs.add(sku);
          }
        });
        tanaSKUs.forEach(sku => {
          window.tanaoroshiState.scannedSkus.delete(sku);
        });
      }
      
      // 完了履歴から該当棚のデータを削除
      if (window.tanaoroshiCompletedHistory) {
        window.tanaoroshiCompletedHistory = window.tanaoroshiCompletedHistory.filter(h => h.tana !== tana);
      }
      
      // 作業情報をクリア

    // 棚卸進捗を計算
    function calculateTanaoroshiProgress() {
      const { selectedTanas, expectedStock, actualStock, scannedSkus, errorSkus } = window.tanaoroshiState;
      
      const tanaProgress = [];
      let totalDataCount = 0;
      let totalScannedCount = 0;
      let totalExpectedCount = 0;
      
      // 総SKU数を計算
      selectedTanas.forEach(tana => {
        Object.keys(expectedStock).forEach(sku => {
          if (expectedStock[sku]?.棚番号 === tana) {
            totalExpectedCount += expectedStock[sku]?.帳簿在庫 || 0;
          }
        });
      });
      
      selectedTanas.forEach(tana => {
        // 完了済み棚のデータを履歴から取得
        const completedData = window.tanaoroshiCompletedHistory?.find(h => h.tana === tana);
        
        if (completedData) {
          // 完了済み棚のデータを使用
          const tanaSkus = Object.keys(completedData.expectedStock).filter(sku => {
            return completedData.expectedStock[sku]?.棚番号 === tana;
          });
          
          const dataCount = tanaSkus.length;
          const scannedCount = completedData.scannedSkus.size;
          
          // ステータス別カウント
          let matchCount = 0;
          let excessCount = 0;
          let shortageCount = 0;
          let errorCount = 0;
          
          const allTanaSkus = new Set([...tanaSkus]);
          
          Object.keys(completedData.actualStock || {}).forEach(sku => {
            if (completedData.actualStock[sku]?.tana === tana) {
              allTanaSkus.add(sku);
            }
          });
          
          if (completedData.errorSkus && completedData.errorSkus.length > 0) {
            completedData.errorSkus.forEach(e => {
              if ((e.棚番号 || e.tana) === tana) {
                allTanaSkus.add(e.sku);
                errorCount++;
              }
            });
          }
          
          allTanaSkus.forEach(sku => {
            const isErrorSku = completedData.errorSkus && completedData.errorSkus.some(e => e.sku === sku && (e.棚番号 || e.tana) === tana);
            if (isErrorSku) return;
            
            const expected = (completedData.expectedStock[sku]?.棚番号 === tana) ? (completedData.expectedStock[sku]?.帳簿在庫 || 0) : 0;
            const actual = (completedData.actualStock && completedData.actualStock[sku]?.tana === tana) ? (completedData.actualStock[sku]?.count || 0) : 0;
            const difference = actual - expected;
            
            if (difference === 0 && actual > 0) {
              matchCount++;
            } else if (difference > 0) {
              excessCount++;
            } else if (difference < 0) {
              shortageCount++;
            }
          });
          
          totalDataCount += dataCount;
          totalScannedCount += scannedCount;
          
          tanaProgress.push({
            tana,
            status: '完',
            dataCount,
            scannedCount,
            matchCount,
            excessCount,
            shortageCount,
            errorCount,
            workerName: completedData.workerName || '小山 大輝',
            startTime: completedData.startTime || '-',
            endTime: completedData.endTime || '-',
            workTime: completedData.workTime || '-'
          });
        } else {
          // 未完了または作業中の棚
          const tanaSkus = Object.keys(expectedStock).filter(sku => {
            const skuTana = expectedStock[sku]?.棚番号;
            return skuTana === tana;
          });
          
          const dataCount = tanaSkus.length;
          
          const scannedTanaSkus = tanaSkus.filter(sku => scannedSkus.has(sku));
          const scannedCount = scannedTanaSkus.length;
          
          // ステータス別カウント
          let matchCount = 0;
          let excessCount = 0;
          let shortageCount = 0;
          let errorCount = 0;
          
          const allTanaSkus = new Set([...tanaSkus]);
          
          Object.keys(actualStock || {}).forEach(sku => {
            if (actualStock[sku]?.tana === tana) {
              allTanaSkus.add(sku);
            }
          });
          
          if (errorSkus && errorSkus.length > 0) {
            errorSkus.forEach(e => {
              if ((e.棚番号 || e.tana) === tana) {
                allTanaSkus.add(e.sku);
                errorCount++;
              }
            });
          }
          
          allTanaSkus.forEach(sku => {
            const isErrorSku = errorSkus && errorSkus.some(e => e.sku === sku && (e.棚番号 || e.tana) === tana);
            if (isErrorSku) return;
            
            const expected = (expectedStock[sku]?.棚番号 === tana) ? (expectedStock[sku]?.帳簿在庫 || 0) : 0;
            const actual = (actualStock && actualStock[sku]?.tana === tana) ? (actualStock[sku]?.count || 0) : 0;
            const difference = actual - expected;
            
            if (difference === 0 && actual > 0) {
              matchCount++;
            } else if (difference > 0) {
              excessCount++;
            } else if (difference < 0) {
              shortageCount++;
            }
          });
          
          totalDataCount += dataCount;
          totalScannedCount += scannedCount;
          
          // 状況を判定
          let status = '未';
          if (scannedCount > 0) {
            status = scannedCount === dataCount ? '完' : '中';
          }
          
          // 作業中の棚の作業情報を取得
          const workInfo = window.tanaoroshiState.tanaWorkInfo?.[tana] || {};
          let startTimeStr = '-';
          if (workInfo.startTime) {
            startTimeStr = workInfo.startTime.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
          }
          
          tanaProgress.push({
            tana,
            status,
            dataCount,
            scannedCount,
            matchCount,
            excessCount,
            shortageCount,
            errorCount,
            workerName: workInfo.workerName || '-',
            startTime: startTimeStr,
            endTime: '-',
            workTime: '-'
          });
        }
      });
      
      // 全体進捗率を計算
      const overallProgress = totalDataCount > 0 ? Math.round((totalScannedCount / totalDataCount) * 100) : 0;
      
      return {
        tanaProgress,
        overallProgress,
        totalExpectedCount
      };
    }

      const areaCheckboxes = document.querySelectorAll('[id$="-all"]');
      areaCheckboxes.forEach(cb => {
        cb.checked = false;
        cb.indeterminate = false;
      });
    }
    
    // 棚番号を検索（前方一致）
    function filterTanaNumbers() {
      const searchInput = document.getElementById('tana-search-input');
      const searchValue = searchInput.value.trim().toUpperCase();
      
      // 各チェックボックスラベルを走査
      const checkboxLabels = document.querySelectorAll('#tanaoroshi-checkbox-list .tanaoroshi-checkbox');
      
      checkboxLabels.forEach(checkbox => {
        const label = checkbox.closest('label');
        const tanaNumber = checkbox.value.toUpperCase();
        
        if (searchValue === '' || tanaNumber.startsWith(searchValue)) {
          label.style.display = '';
        } else {
          label.style.display = 'none';
        }
      });
      
      // 各エリアセクションの表示/非表示を更新
      const areaSections = document.querySelectorAll('#tanaoroshi-checkbox-list > div');
      areaSections.forEach(section => {
        const visibleLabels = section.querySelectorAll('label[style=""], label:not([style])');
        const hiddenLabels = section.querySelectorAll('label[style*="display: none"]');
        const allLabels = section.querySelectorAll('.tanaoroshi-checkbox');
        
        // すべてのラベルが非表示なら、セクション全体を非表示
        if (hiddenLabels.length === allLabels.length) {
          section.style.display = 'none';
        } else {
          section.style.display = '';
        }
      });
    }
    
    // 棚番号検索をクリア
    function clearTanaSearch() {
      const searchInput = document.getElementById('tana-search-input');
      if (searchInput) {
        searchInput.value = '';
        filterTanaNumbers();
      }
    }
    
    // 棚卸を開始
    function startTanaoroshi() {
      // 追加された棚番号を使用
      const selectedTanas = window.tanaoroshiState.addedTanas || [];
      
      if (selectedTanas.length === 0) {
        alert('棚番号を追加してください');
        return;
      }
      
      // 選択した棚番号の在庫データを取得
      const kenpinOkData = kenpinData.filter(k => k.ステータス === '検品OK');
      const expectedStock = {};
      
      kenpinOkData.forEach(kenpin => {
        const registeredItem = registeredData.find(d => 
          d.SKU === kenpin.SKU && d.荷物番号 === kenpin.荷物番号
        );
        
        const tana = kenpin.棚番号 || registeredItem?.棚番号;
        
        if (selectedTanas.includes(tana)) {
          if (!expectedStock[kenpin.SKU]) {
            expectedStock[kenpin.SKU] = {
              商品名: kenpin.商品名,
              SKU: kenpin.SKU,
              帳簿在庫: 0,
              実在庫: 0,
              棚番号: tana
            };
          }
          expectedStock[kenpin.SKU].帳簿在庫++;
        }
      });

      // 追加: TRインポート在庫も棚卸対象に含める（棚振り後はkenpinDataに存在しないため）
      if (window.importedTRData && window.importedTRData.length > 0) {
        window.importedTRData.forEach(tr => {
          // 棚番号が存在し、選択された棚で、棚卸対象ステータス(販売待ち/販売中)のものを対象
          const tana = tr.棚番号;
          if (!tana) return;
          if (!selectedTanas.includes(tana)) return;
          if (!(tr.在庫ステータス === '販売待ち' || tr.在庫ステータス === '販売待' || tr.在庫ステータス === '販売中')) return;
          const sku = tr.SKU;
          if (!expectedStock[sku]) {
            expectedStock[sku] = {
              商品名: tr.商品名,
              SKU: sku,
              帳簿在庫: 0,
              実在庫: 0,
              棚番号: tana
            };
          }
          // 在庫数プロパティがあれば使用、なければ1個として加算
          const addCount = tr.在庫数 ? parseInt(tr.在庫数, 10) || 1 : 1;
          expectedStock[sku].帳簿在庫 += addCount;
        });
      }
      
      if (Object.keys(expectedStock).length === 0) {
        alert('選択した棚番号に在庫がありません');
        return;
      }
      
      // 状態を保存
      window.tanaoroshiState = {
        selectedTanas: selectedTanas,
        expectedStock: expectedStock,
        actualStock: {},
        scannedSkus: new Set(),
        currentTana: null,  // 現在スキャン中の棚番号
        currentTanaScannedSkus: [],  // 現在の棚でスキャンしたSKU履歴
        completedTanas: [],  // 完了済みの棚番号
        notes: {},  // 棚卸精査備考
        errorCauses: {}  // エラー原因
      };
      
      // 棚卸作業画面に遷移
      showTanaoroshiWorkScreen();
      
      showNotification(`棚番号「${selectedTanas.join(', ')}」の棚卸を開始しました`, 'success');
    }
    
    // 棚番号入力処理
    function handleTanaoroshiTanaInput(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        const tana = document.getElementById('tanaoroshi-tana-input').value.trim();
        if (tana) {
          processTanaoroshiTana(tana);
        }
      }
    }
    
    // 棚番号を処理
    function processTanaoroshiTana(tana) {
      const { selectedTanas, expectedStock, currentTana, completedTanas } = window.tanaoroshiState;
      
      // 完了済みの棚番号かチェック
      if (completedTanas && completedTanas.includes(tana)) {
        showTanaStatusModal('完了済み', tana);
        document.getElementById('tanaoroshi-tana-input').value = '';
        return;
      }
      
      // 現在実施中の棚番号かチェック
      if (currentTana && currentTana === tana) {
        showTanaStatusModal('実施中', tana);
        document.getElementById('tanaoroshi-tana-input').value = '';
        return;
      }
      
      // 選択された棚番号に含まれているかチェック
      if (selectedTanas.includes(tana)) {
        // 現在の棚番号を保存
        window.tanaoroshiState.currentTana = tana;
        
        // 開始時刻と作業者名を記録
        if (!window.tanaoroshiState.tanaWorkInfo) {
          window.tanaoroshiState.tanaWorkInfo = {};
        }
        window.tanaoroshiState.tanaWorkInfo[tana] = {
          workerName: '小山 大輝',
          startTime: new Date()
        };
        
        // スキャンした棚のSKU履歴をリセット
        window.tanaoroshiState.currentTanaScannedSkus = [];
        
        // 棚番号スキャンエリアを非表示
        document.getElementById('tana-scan-area').style.display = 'none';
        
        // SKUスキャンエリアを表示
        document.getElementById('sku-scan-area').style.display = 'block';
        document.getElementById('scanned-tana-display').textContent = tana;
        
        // 棚のSKU一覧を表示
        displayTanaSkuList(tana);
        
        // スキャンしたSKUリストをクリア
        document.getElementById('scanned-sku-list').innerHTML = '<p class="text-sm text-gray-500">まだスキャンされていません</p>';
        
        // SKU入力欄にフォーカス
        setTimeout(() => {
          document.getElementById('tanaoroshi-sku-input')?.focus();
        }, 100);
        
        showNotification(`棚番号「${tana}」を選択しました。SKUをスキャンしてください。`, 'success');
      } else {
        showNotification(`エラー: 棚番号「${tana}」は選択された棚に含まれていません`, 'error');
        document.getElementById('tanaoroshi-tana-input').value = '';
      }
    }
    
    // 棚のSKU一覧を表示
    function displayTanaSkuList(tana) {
      const { expectedStock, actualStock } = window.tanaoroshiState;
      const tanaSkuListDiv = document.getElementById('tana-sku-list');
      
      // この棚に入っているSKUを抽出（複数個の場合は個数分追加）
      const tanaSkuItems = [];
      Object.values(expectedStock).forEach(item => {
        if (item.棚番号 === tana) {
          // スキャン済みの場合は、帳簿在庫から実在庫を引いた数を表示
          const scannedCount = actualStock[item.SKU]?.count || 0;
          const remainingCount = Math.max(0, item.帳簿在庫 - scannedCount);
          
          // 残りの個数分、データを追加
          for (let i = 0; i < remainingCount; i++) {
            tanaSkuItems.push({
              ...item,
              index: i + 1
            });
          }
        }
      });
      
      if (tanaSkuItems.length === 0) {
        tanaSkuListDiv.innerHTML = '<p class="text-sm text-gray-500">この棚にはSKUがありません</p>';
        return;
      }
      
      tanaSkuListDiv.innerHTML = '';
      
      tanaSkuItems.forEach(item => {
        const skuDiv = document.createElement('div');
        skuDiv.className = 'bg-white border border-blue-300 rounded-lg p-3 shadow-sm';
        skuDiv.innerHTML = `
          <div class="flex justify-between items-center">
            <div>
              <div class="text-sm font-semibold text-gray-900">${item.商品名}</div>
              <div class="text-xs text-gray-600 font-mono mt-1">SKU: ${item.SKU}</div>
            </div>
            <div class="text-right">
              <div class="text-xs text-gray-500">${item.index}個目</div>
              <div class="text-sm font-semibold text-blue-600">✓</div>
            </div>
          </div>
        `;
        tanaSkuListDiv.appendChild(skuDiv);
      });
    }
    
    // 棚番号入力欄をクリア
    function clearTanaoroshiTanaInput() {
      document.getElementById('tanaoroshi-tana-input').value = '';
      document.getElementById('tanaoroshi-tana-input')?.focus();
    }
    
    // SKU入力処理
    function handleTanaoroshiSkuInput(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        const sku = document.getElementById('tanaoroshi-sku-input').value.trim();
        if (sku) {
          processTanaoroshiSku(sku);
        }
      }
    }
    
    // UUIDを生成する関数
    function generateUUID() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }
    
    // SKUを処理
    function processTanaoroshiSku(sku) {
      const { selectedTanas, expectedStock, actualStock, currentTana } = window.tanaoroshiState;
      
      // 棚番号が選択されているか確認
      if (!currentTana) {
        showNotification('エラー: まず棚番号をスキャンしてください', 'error');
        return;
      }
      
      // 現在の棚にこのSKUが入っているかチェック
      const isExpectedInCurrentTana = expectedStock[sku] && expectedStock[sku].棚番号 === currentTana;
      
      if (!isExpectedInCurrentTana) {
        // 棚に入っていないSKUをスキャンした場合、確認ダイアログを表示
        showErrorSkuDialog(sku);
        return;
      }
      
      // 実在庫をカウント（棚番号ごとに管理）
      if (!actualStock[sku]) {
        actualStock[sku] = {
          count: 0,
          tana: currentTana,
          shohinmei: expectedStock[sku]?.商品名 || '-',
          uuid: generateUUID()
        };
      }
      actualStock[sku].count++;
      
      // 帳簿在庫と比較して余剰チェック
      const bookStock = expectedStock[sku]?.帳簿在庫 || 0;
      if (actualStock[sku].count > bookStock) {
        // 余剰の場合、モーダルで確認
        showSurplusSkuDialog(sku);
        return;
      }
      
      // スキャン済みSKUに追加
      window.tanaoroshiState.scannedSkus.add(sku);
      
      // 現在の棚でスキャンしたSKUリストに追加
      if (!window.tanaoroshiState.currentTanaScannedSkus) {
        window.tanaoroshiState.currentTanaScannedSkus = [];
      }
      window.tanaoroshiState.currentTanaScannedSkus.push({
        sku: sku,
        timestamp: new Date().toLocaleTimeString('ja-JP')
      });
      
      // 帳簿在庫と照合
      showNotification(`棚「${currentTana}」でSKU「${sku}」をカウントしました (${actualStock[sku].count}個目)`, 'success');
      
      // スキャンしたSKUリストを更新
      displayScannedSkuList();
      
      // 棚のSKU一覧を更新（スキャン済みSKUを非表示にする）
      displayTanaSkuList(currentTana);
      
      // 入力欄をクリア
      clearTanaoroshiInput();
    }
    
    // スキャンしたSKUリストを表示
    function displayScannedSkuList() {
      const { currentTanaScannedSkus, expectedStock } = window.tanaoroshiState;
      const scannedSkuListDiv = document.getElementById('scanned-sku-list');
      
      if (!currentTanaScannedSkus || currentTanaScannedSkus.length === 0) {
        scannedSkuListDiv.innerHTML = '<p class="text-sm text-gray-500">まだスキャンされていません</p>';
        return;
      }
      
      scannedSkuListDiv.innerHTML = '';
      
      // 最新のものから順に表示
      [...currentTanaScannedSkus].reverse().forEach((item, index) => {
        const skuInfo = expectedStock[item.sku];
        const isExpected = !!skuInfo;
        
        const skuDiv = document.createElement('div');
        skuDiv.className = `bg-white border ${isExpected ? 'border-green-300' : 'border-red-300'} rounded-lg p-3 shadow-sm`;
        skuDiv.innerHTML = `
          <div class="flex justify-between items-start">
            <div class="flex-1">
              <div class="flex items-center gap-2">
                <span class="text-xs font-semibold ${isExpected ? 'text-green-600' : 'text-red-600'}">
                  ${isExpected ? '✓' : '⚠'}
                </span>
                <span class="text-sm font-semibold text-gray-900">
                  ${skuInfo ? skuInfo.商品名 : '未登録'}
                </span>
              </div>
              <div class="text-xs text-gray-600 font-mono mt-1">SKU: ${item.sku}</div>
              <div class="text-xs text-gray-400 mt-1">${item.timestamp}</div>
            </div>
            <div class="text-xs ${isExpected ? 'text-green-600' : 'text-red-600'} font-semibold">
              ${isExpected ? 'OK' : '過剰'}
            </div>
          </div>
        `;
        scannedSkuListDiv.appendChild(skuDiv);
      });
    }
    
    // 棚卸結果を表示
    function displayTanaoroshiResult() {
      const tbody = document.getElementById('tanaoroshi-result-body');
      const { expectedStock, actualStock, scannedSkus } = window.tanaoroshiState;
      
      // 全てのSKU（帳簿在庫 + 実在庫）を取得
      const allSkus = new Set([...Object.keys(expectedStock), ...Object.keys(actualStock)]);
      
      tbody.innerHTML = '';
      
      allSkus.forEach(sku => {
        const expected = expectedStock[sku]?.帳簿在庫 || 0;
        const actualData = actualStock[sku];
        const actual = actualData?.count || 0;
        const difference = actual - expected;
        
        const row = document.createElement('tr');
        
        // ステータスの判定
        let statusClass, statusText, rowClass;
        if (difference === 0 && scannedSkus.has(sku)) {
          statusClass = 'bg-green-100 text-green-800';
          statusText = '一致';
          rowClass = 'bg-green-50';
        } else if (difference > 0) {
          statusClass = 'bg-red-100 text-red-800';
          statusText = '過剰';
          rowClass = 'bg-red-50';
        } else if (difference < 0) {
          statusClass = 'bg-yellow-100 text-yellow-800';
          statusText = '不足';
          rowClass = 'bg-yellow-50';
        } else {
          statusClass = 'bg-gray-100 text-gray-800';
          statusText = '未カウント';
          rowClass = '';
        }
        
        const differenceText = difference > 0 ? `+${difference}` : difference;
        const differenceClass = difference > 0 ? 'text-red-600' : difference < 0 ? 'text-yellow-600' : 'text-green-600';
        
        row.className = `${rowClass} hover:bg-gray-100 transition-colors duration-150`;
        row.innerHTML = `
          <td class="px-6 py-4 text-sm text-gray-900">${expectedStock[sku]?.商品名 || '-'}</td>
          <td class="px-6 py-4 text-sm text-gray-900 font-mono">${sku}</td>
          <td class="px-6 py-4 text-sm text-gray-900 font-semibold">${expected}</td>
          <td class="px-6 py-4 text-sm font-semibold ${actual > 0 ? 'text-blue-600' : 'text-gray-400'}">${actual}</td>
          <td class="px-6 py-4 text-sm font-semibold ${differenceClass}">${differenceText}</td>
          <td class="px-6 py-4 text-sm">
            <span class="px-2 py-1 text-xs font-medium rounded-full ${statusClass}">
              ${statusText}
            </span>
          </td>
        `;
        tbody.appendChild(row);
      });
    }
    
    // 棚卸結果詳細（結果ページ用）を表示
    function displayTanaoroshiResultSummary() {
      const tbody = document.getElementById('tanaoroshi-result-summary-body');
      const resultData = window.tanaoroshiResultData;
      
      if (!resultData) return;
      
      const { selectedTanas, expectedStock, actualStock, scannedSkus, errorSkus } = resultData;
      
      // 完了した棚番号のみを対象とする
      const completedTana = selectedTanas && selectedTanas.length > 0 ? selectedTanas[0] : null;
      
      if (!completedTana) {
        tbody.innerHTML = `
          <tr>
            <td colspan="10" class="px-6 py-12 text-center">
              <div class="flex flex-col items-center justify-center text-gray-500">
                <i data-lucide="inbox" class="w-16 h-16 mb-4 text-gray-400"></i>
                <p class="text-lg font-medium mb-2">棚卸結果がありません</p>
                <p class="text-sm">棚卸実施画面で棚卸を実施してください</p>
              </div>
            </td>
          </tr>
        `;
        lucide.createIcons();
        return;
      }
      
      // 完了した棚のSKUのみを取得
      const allSkus = new Set();
      
      // 帳簿在庫から完了した棚のSKUを抽出
      Object.keys(expectedStock).forEach(sku => {
        if (expectedStock[sku]?.棚番号 === completedTana) {
          allSkus.add(sku);
        }
      });
      
      // 実在庫から完了した棚のSKUを追加
      Object.keys(actualStock).forEach(sku => {
        if (actualStock[sku]?.tana === completedTana) {
          allSkus.add(sku);
        }
      });
      
      // エラー専用SKUも追加（完了した棚のもののみ）
      if (errorSkus && errorSkus.length > 0) {
        errorSkus.forEach(e => {
          if ((e.棚番号 || e.tana) === completedTana) {
            allSkus.add(e.sku);
          }
        });
      }
      
      tbody.innerHTML = '';
      
      if (allSkus.size === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="10" class="px-6 py-12 text-center">
              <div class="flex flex-col items-center justify-center text-gray-500">
                <i data-lucide="inbox" class="w-16 h-16 mb-4 text-gray-400"></i>
                <p class="text-lg font-medium mb-2">棚卸結果がありません</p>
                <p class="text-sm">棚卸実施画面で棚卸を実施してください</p>
              </div>
            </td>
          </tr>
        `;
        lucide.createIcons();
        return;
      }
      
      const errorSkuMap = new Map((errorSkus || []).map(e => [e.sku, e]));
      
      // 行データを生成
      const rows = [];
      
      allSkus.forEach(sku => {
        const expected = (expectedStock[sku]?.棚番号 === completedTana) ? (expectedStock[sku]?.帳簿在庫 || 0) : 0;
        const actualData = actualStock[sku];
        const actual = (actualData?.tana === completedTana) ? (actualData?.count || 0) : 0;
        const errorData = errorSkuMap.get(sku);
        const tana = errorData?.tana || errorData?.棚番号 || actualData?.tana || expectedStock[sku]?.棚番号 || '-';
        const uuid = actualData?.uuid || '-';
        const shohinName = expectedStock[sku]?.商品名 || '-';
        
        // ロケーションマスタから倉庫を検索
        const locationRecord = locationMasterData.find(loc => loc.棚番号 === tana);
        const warehouse = locationRecord?.倉庫 || '-';
        
        // 在庫データから仕切価格を取得
        const zaikoRecord = zaikoDataArray.find(z => z.SKU === sku);
        const shikiriKakaku = zaikoRecord?.仕切価格 || '-';
        
        // 帳簿在庫分を処理
        if (expected > 0) {
          const matchCount = Math.min(expected, actual);
          const shortageCount = Math.max(0, expected - actual);
          
          // 一致分
          if (matchCount > 0) {
            rows.push({
              sku: sku,
              tana: tana,
              warehouse: warehouse,
              shohinName: shohinName,
              expected: matchCount,
              actual: matchCount,
              status: '一致',
              statusClass: 'bg-green-100 text-green-800',
              rowClass: 'bg-white',
              uuid: uuid,
              difference: 0,
              shikiriKakaku: shikiriKakaku
            });
          }
          
          // 不足分
          if (shortageCount > 0) {
            rows.push({
              sku: sku,
              tana: tana,
              warehouse: warehouse,
              shohinName: shohinName,
              expected: shortageCount,
              actual: 0,
              status: '不足',
              statusClass: 'bg-yellow-100 text-yellow-800',
              rowClass: 'bg-white',
              uuid: '-',
              difference: -shortageCount,
              shikiriKakaku: shikiriKakaku
            });
          }
        }
        
        // エラーSKUを処理
        if (errorData) {
          const reason = errorData.reason || 'データ無し';
          const statusText = reason === 'エラーSKU' ? 'データ無し' : reason;
          // 余剰はオレンジ色、データ無しは紫色で表示
          const errorStatusClass = statusText === '余剰' ? 'bg-orange-100 text-orange-800' : 'bg-purple-100 text-purple-800';
          // エラーSKUのUUIDを取得（エラーデータから、または通常のデータから）
          const errorUuid = errorData.uuid || uuid;
          rows.push({
            sku: sku,
            tana: errorData.棚番号 || errorData.tana || '-',
            warehouse: warehouse,
            shohinName: shohinName,
            expected: 0,
            actual: 1,
            status: statusText,
            statusClass: errorStatusClass,
            rowClass: 'bg-white',
            uuid: errorUuid,
            difference: 1,
            shikiriKakaku: shikiriKakaku
          });
        }
      });
      
      // 行を表示
      rows.forEach(rowData => {
        const row = document.createElement('tr');
        const differenceText = rowData.difference > 0 ? `+${rowData.difference}` : rowData.difference;
        const differenceClass = rowData.difference > 0 ? 'text-red-600' : rowData.difference < 0 ? 'text-yellow-600' : 'text-green-600';

    function confirmTanaoroshi() {
      const { currentTana, expectedStock, actualStock, scannedSkus, errorSkus } = window.tanaoroshiState;
      
      // 過不足の集計（現在の棚のみ）
      let matchCount = 0;
      let excessCount = 0;
      let shortageCount = 0;
      
      // 現在の棚のSKUのみを対象にする
      const currentTanaSkus = new Set();
      
      // 帳簿在庫から現在の棚のSKUを抽出
      Object.keys(expectedStock).forEach(sku => {
        if (expectedStock[sku]?.棚番号 === currentTana) {
          currentTanaSkus.add(sku);
        }
      });
      
      // 実在庫から現在の棚のSKUを追加
      Object.keys(actualStock).forEach(sku => {
        if (actualStock[sku]?.tana === currentTana) {
          currentTanaSkus.add(sku);
        }
      });
      
      // 過不足を集計
      currentTanaSkus.forEach(sku => {
        const expected = (expectedStock[sku]?.棚番号 === currentTana) ? (expectedStock[sku]?.帳簿在庫 || 0) : 0;
        const actual = (actualStock[sku]?.tana === currentTana) ? (actualStock[sku]?.count || 0) : 0;
        const difference = actual - expected;
        
        if (difference === 0) {
          matchCount++;
        } else if (difference > 0) {
          excessCount++;
        } else {
          shortageCount++;
        }
      });
      
      const totalItems = currentTanaSkus.size;
      const currentErrorSkus = (errorSkus || []).filter(e => (e.棚番号 || e.tana) === currentTana);
      const message = `棚卸完了\n\n` +
        `対象棚番号: ${currentTana}\n` +
        `総SKU数: ${totalItems}\n` +
        `一致: ${matchCount}件\n` +
        `過剰: ${excessCount}件\n` +
        `不足: ${shortageCount}件\n` +
        `エラーSKU: ${currentErrorSkus.length}件` +
        (currentErrorSkus.length > 0 ? `\n  -> ${currentErrorSkus.map(e => e.sku + (e.reason ? '('+ e.reason +')' : '')).join(', ')}` : '');
      
      alert(message);
      
      // ステート破棄時に結果が消えないようディープコピーを保持
      const clonedExpectedStock = JSON.parse(JSON.stringify(expectedStock));
      const clonedActualStock = JSON.parse(JSON.stringify(actualStock));
      const clonedScannedSkus = new Set(scannedSkus ? Array.from(scannedSkus) : []);
      const clonedErrorSkus = JSON.parse(JSON.stringify(errorSkus || []));

      // 棚卸結果を保存（現在の棚のみ）
      window.tanaoroshiResultData = {
        selectedTanas: [currentTana],
        expectedStock: clonedExpectedStock,
        actualStock: clonedActualStock,
        scannedSkus: clonedScannedSkus,
        errorSkus: clonedErrorSkus,
        completedAt: new Date().toLocaleString('ja-JP')
      };
      
      // 完了した棚のデータを履歴に保存
      if (!window.tanaoroshiCompletedHistory) {
        window.tanaoroshiCompletedHistory = [];
      }
      
      // 作業時間情報を取得
      const workInfo = window.tanaoroshiState.tanaWorkInfo?.[currentTana] || {};
      const endTime = new Date();
      let workDuration = '-';
      let startTimeStr = '-';
      let endTimeStr = endTime.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      
      if (workInfo.startTime) {
        startTimeStr = workInfo.startTime.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const diffMs = endTime - workInfo.startTime;
        const diffSec = Math.floor(diffMs / 1000);
        const hours = Math.floor(diffSec / 3600);
        const minutes = Math.floor((diffSec % 3600) / 60);
        const seconds = diffSec % 60;
        if (hours > 0) {
          workDuration = `${hours}時間${minutes}分${seconds}秒`;
        } else if (minutes > 0) {
          workDuration = `${minutes}分${seconds}秒`;
        } else {
          workDuration = `${seconds}秒`;
        }
      }
      
      window.tanaoroshiCompletedHistory.push({
        tana: currentTana,
        expectedStock: JSON.parse(JSON.stringify(expectedStock)),
        actualStock: JSON.parse(JSON.stringify(actualStock)),
        scannedSkus: new Set(scannedSkus),
        errorSkus: JSON.parse(JSON.stringify(errorSkus || [])),
        completedAt: new Date().toLocaleString('ja-JP'),
        workerName: workInfo.workerName || '小山 大輝',
        startTime: startTimeStr,
        endTime: endTimeStr,
        workTime: workDuration
      });
      
      // モーダルを削除
      const backdrop = document.getElementById('tanaoroshi-modal-backdrop');
      if (backdrop) {
        backdrop.remove();
      }
      
      // 完了した棚番号をcompletedTanasに追加
      if (!window.tanaoroshiState.completedTanas) {
        window.tanaoroshiState.completedTanas = [];
      }
      if (!window.tanaoroshiState.completedTanas.includes(currentTana)) {
        window.tanaoroshiState.completedTanas.push(currentTana);
      }
      
      // 現在の棚のデータのみクリア（selectedTanasは保持）
      window.tanaoroshiState.currentTana = null;
      // 他のデータをクリア
      const currentSelectedTanas = window.tanaoroshiState.selectedTanas;
      const currentExpectedStock = window.tanaoroshiState.expectedStock;
      
      // 完了した棚のデータを削除
      Object.keys(currentExpectedStock).forEach(sku => {
        if (currentExpectedStock[sku]?.棚番号 === currentTana) {
          delete currentExpectedStock[sku];
        }
      });
      
      Object.keys(window.tanaoroshiState.actualStock).forEach(sku => {
        if (window.tanaoroshiState.actualStock[sku]?.tana === currentTana) {
          delete window.tanaoroshiState.actualStock[sku];
        }
      });
      
      // scannedSkusから完了した棚のSKUを削除（必要に応じて）
      
      showTanaoroshiWorkScreen();
    }

    // 棚卸結果をCSVエクスポート
    function exportTanaoroshiResult() {
      const { selectedTanas, expectedStock, actualStock, scannedSkus } = window.tanaoroshiState;
      
      if (!selectedTanas || selectedTanas.length === 0) {
        alert('エクスポートするデータがありません');
        return;
      }
      
      // ヘッダー行
      let csv = '棚番号,商品名,SKU,帳簿在庫,実在庫,過不足,ステータス,棚卸日時\n';
      
      // 全てのSKU（帳簿在庫 + 実在庫）を取得
      const allSkus = new Set([...Object.keys(expectedStock), ...Object.keys(actualStock)]);
      const now = new Date().toISOString().slice(0, 19).replace('T', ' ');
      
      // データ行を追加
      Array.from(allSkus).sort().forEach(sku => {
        const expected = expectedStock[sku]?.帳簿在庫 || 0;
        const actualData = actualStock[sku];
        const actual = actualData?.count || 0;
        const uuid = actualData?.uuid || '';
        const difference = actual - expected;
        const tanaNumber = actualData?.tana || expectedStock[sku]?.棚番号 || '';
        
        // ステータスの判定
        let statusText;
        if (difference === 0 && scannedSkus.has(sku)) {
          statusText = '一致';
        } else if (difference > 0) {
          statusText = '過剰';
        } else if (difference < 0) {
          statusText = '不足';
        } else {
          statusText = '未カウント';
        }
        
        const differenceText = difference > 0 ? `+${difference}` : difference;
        const shohinName = expectedStock[sku]?.商品名 || '';
        
        csv += `${tanaNumber},${uuid},${shohinName},${sku},${expected},${actual},${differenceText},${statusText},${now}\n`;
      });
      
      // サマリー行を追加
      const totalSkus = allSkus.size;
      let matchCount = 0;
      let excessCount = 0;
      let shortageCount = 0;
      
      allSkus.forEach(sku => {
        const expected = expectedStock[sku]?.帳簿在庫 || 0;
        const actualData = actualStock[sku];
        const actual = actualData?.count || 0;
        const difference = actual - expected;
        
        if (difference === 0) matchCount++;
        else if (difference > 0) excessCount++;
        else shortageCount++;
      });
      
      csv += `\n【集計】\n`;
      csv += `総SKU数,${totalSkus}\n`;
      csv += `一致,${matchCount}\n`;
      csv += `過剰,${excessCount}\n`;
      csv += `不足,${shortageCount}\n`;
      
      // BOMを追加してExcelで文字化けを防ぐ
      const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
      const blob = new Blob([bom, csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      
      link.setAttribute('href', url);
      link.setAttribute('download', `棚卸結果_${selectedTanas.join('_')}_${new Date().toISOString().slice(0, 10)}.csv`);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();

      showNotification('棚卸結果をエクスポートしました', 'success');

    // 棚卸結果ページからのエクスポート
    function exportTanaoroshiResultFromResultPage() {
      const resultData = window.tanaoroshiResultData;
      
      if (!resultData) {
        alert('エクスポートするデータがありません');
        return;
      }
      
      const { selectedTanas, expectedStock, actualStock, errorSkus, completedAt } = resultData;
      const completedTana = selectedTanas && selectedTanas.length > 0 ? selectedTanas[0] : null;
      
      // ヘッダー行（テーブルのカラムと同じ）
      let csv = '倉庫,棚番号,商品名,SKU,仕切(税抜),帳簿在庫,実在庫,過不足,結果,商品ID,作業者,棚卸精査備考,エラー原因\n';
      
      // 完了した棚のSKUのみを取得
      const allSkus = new Set();
      
      // 帳簿在庫から完了した棚のSKUを抽出
      Object.keys(expectedStock).forEach(sku => {
        if (expectedStock[sku]?.棚番号 === completedTana) {
          allSkus.add(sku);
        }
      });
      
      // 実在庫から完了した棚のSKUを追加
      Object.keys(actualStock).forEach(sku => {
        if (actualStock[sku]?.tana === completedTana) {
          allSkus.add(sku);
        }
      });
      
      // エラー専用SKUも追加（完了した棚のもののみ）
      if (errorSkus && errorSkus.length > 0) {
        errorSkus.forEach(e => {
          if ((e.棚番号 || e.tana) === completedTana) {
            allSkus.add(e.sku);
          }
        });
      }
      
      const errorSkuMap = new Map((errorSkus || []).map(e => [e.sku, e]));
      
      // 行データを生成（displayTanaoroshiResultSummaryと同じロジック）
      const rows = [];
      
      allSkus.forEach(sku => {
        const expected = (expectedStock[sku]?.棚番号 === completedTana) ? (expectedStock[sku]?.帳簿在庫 || 0) : 0;
        const actualData = actualStock[sku];
        const actual = (actualData?.tana === completedTana) ? (actualData?.count || 0) : 0;
        const errorData = errorSkuMap.get(sku);
        const tana = errorData?.tana || errorData?.棚番号 || actualData?.tana || expectedStock[sku]?.棚番号 || '-';
        const uuid = actualData?.uuid || '-';
        const shohinName = expectedStock[sku]?.商品名 || '-';
        
        // ロケーションマスタから倉庫を検索
        const locationRecord = locationMasterData.find(loc => loc.棚番号 === tana);
        const warehouse = locationRecord?.倉庫 || '-';
        
        // 在庫データから仕切価格を取得
        const zaikoRecord = zaikoDataArray.find(z => z.SKU === sku);
        const shikiriKakaku = zaikoRecord?.仕切価格 || '-';
        
        // 備考とエラー原因を取得
        const note = window.tanaoroshiState?.notes?.[sku] || '';
        const errorCause = window.tanaoroshiState?.errorCauses?.[sku] || '';
        
        // 帳簿在庫分を処理
        if (expected > 0) {
          const matchCount = Math.min(expected, actual);
          const shortageCount = Math.max(0, expected - actual);
          
          // 一致分
          if (matchCount > 0) {
            rows.push({
              warehouse, tana, shohinName, sku, shikiriKakaku,
              expected: matchCount, actual: matchCount, difference: 0,
              status: '一致', uuid, worker: '-', note, errorCause
            });
          }
          
          // 不足分
          if (shortageCount > 0) {
            rows.push({
              warehouse, tana, shohinName, sku, shikiriKakaku,
              expected: shortageCount, actual: 0, difference: -shortageCount,
              status: '不足', uuid: '-', worker: '-', note, errorCause
            });
          }
        }
        
        // エラーSKUを処理
        if (errorData) {
          const reason = errorData.reason || 'データ無し';
          const statusText = reason === 'エラーSKU' ? 'データ無し' : reason;
          const errorUuid = errorData.uuid || uuid;
          rows.push({
            warehouse, tana: errorData.棚番号 || errorData.tana || '-', shohinName, sku, shikiriKakaku,
            expected: 0, actual: 1, difference: 1,
            status: statusText, uuid: errorUuid, worker: '-', note, errorCause
          });
        }
      });
      
      // CSV行を出力
      rows.forEach(row => {
        const differenceText = row.difference > 0 ? `+${row.difference}` : row.difference;
        // カンマを含む可能性のあるフィールドをダブルクォートで囲む
        const escapeCsv = (val) => {
          const str = String(val || '');
          if (str.includes(',') || str.includes('"') || str.includes('\n')) {
            return `"${str.replace(/"/g, '""')}"`;
          }
          return str;
        };
        csv += `${escapeCsv(row.warehouse)},${escapeCsv(row.tana)},${escapeCsv(row.shohinName)},${escapeCsv(row.sku)},${escapeCsv(row.shikiriKakaku)},${row.expected},${row.actual},${differenceText},${escapeCsv(row.status)},${escapeCsv(row.uuid)},${escapeCsv(row.worker)},${escapeCsv(row.note)},${escapeCsv(row.errorCause)}\n`;
      });
      
      // BOMを追加してExcelで文字化けを防ぐ
      const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
      const blob = new Blob([bom, csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      
      link.setAttribute('href', url);
      link.setAttribute('download', `棚卸結果詳細_${completedTana || 'all'}_${new Date().toISOString().slice(0, 10)}.csv`);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      
      showNotification('棚卸結果詳細をエクスポートしました', 'success');
    }

    // CSVインポート機能（発送完了登録）
    function importHassokanryoCSV() {
      document.getElementById('hassokanryo-csv-input').click();

    // 発送完了登録CSVインポート処理
    function handleHassokanryoCSVUpload(event, platformId) {
      const file = event.target.files[0];
      if (file) {
        // まずUTF-8で読み込みを試みる
        const reader = new FileReader();
        reader.onload = function(e) {
          let text = e.target.result;
          // 文字化けチェック（置換文字「�」が含まれているか確認）
          if (text.includes('\uFFFD') || text.includes('�')) {
            // Shift-JISで再読み込み
            const readerSjis = new FileReader();
            readerSjis.onload = function(e2) {
              parseHassokanryoCSV(e2.target.result, platformId);
            };
            readerSjis.readAsText(file, 'Shift_JIS');
          } else {
            parseHassokanryoCSV(text, platformId);
          }
        };
        reader.readAsText(file, 'UTF-8');
      }
    }
    
    // 発送完了登録CSVパース処理
    function parseHassokanryoCSV(content, platformId) {
      const lines = content.split('\n');
      const tbody = document.getElementById('hassokanryo-data-body');
      
      // 「データなし」メッセージを削除
      const noDataMessage = document.getElementById('hassokanryo-no-data-message');
      if (noDataMessage) {
        noDataMessage.remove();
      }
      
      let importedCount = 0;
      
      // ヘッダー行をスキップして2行目から処理
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line) {
          const columns = line.split(',');
          const row = document.createElement('tr');
          row.className = 'hover:bg-gray-50 transition-colors duration-150 imported-row';

          if (platformId === 'yahoo') {
            if (columns.length >= 5) {
              row.innerHTML = `
                <td class="px-6 py-4 text-sm text-gray-900">${columns[0] || ''}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[1] || ''}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[2] || ''}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[3] || ''}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[4] || ''}</td>
              `;
              tbody.appendChild(row);
              importedCount++;
            }
          } else {
            if (columns.length >= 4) {
              row.innerHTML = `
                <td class="px-6 py-4 text-sm text-gray-900">${columns[0] || ''}</td>
                <td class="px-6 py-4 text-sm text-blue-600 font-semibold">${columns[1] || ''}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[2] || ''}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[3] || ''}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[4] || ''}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[5] || ''}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[6] || ''}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[7] || ''}</td>
              `;
              tbody.appendChild(row);
              importedCount++;
            }
          }
        }
      }
      
      // データ登録ボタンを有効化
      const registerButton = document.getElementById('hassokanryo-register-btn');
      if (registerButton) {
        registerButton.disabled = false;
      }
      
      // 件数表示を更新
      updateHassokanryoRowCount();
      
      lucide.createIcons();
    }
    
    // 発送完了登録の件数表示を更新
    function updateHassokanryoRowCount() {
      const tbody = document.getElementById('hassokanryo-data-body');
      const rows = tbody.querySelectorAll('tr:not(#hassokanryo-no-data-message)');
      const count = rows.length;
      
      const totalCountEl = document.getElementById('hassokanryo-total-count');
      const displayRangeEl = document.getElementById('hassokanryo-display-range');
      
      if (totalCountEl) {
        totalCountEl.textContent = count;
      }
      if (displayRangeEl) {
        displayRangeEl.textContent = count > 0 ? `1-${count}` : '0-0';
      }
    }
    
    // 発送完了登録データ登録処理
    function registerHassokanryoData(platformId) {
      const tbody = document.getElementById('hassokanryo-data-body');
      const rows = tbody.querySelectorAll('tr:not(#hassokanryo-no-data-message)');
      
      if (rows.length === 0) {
        alert('登録するデータがありません');
        return;
      }

          );
          if (matchingShukka) {

        });

        // 在庫一覧データ（registeredData）の在庫ステータスを「発送済」に更新
        let matchedCount = 0;
        registeredItems.forEach(item => {

          registeredData.forEach(zaikoItem => {

            }
          });
        });
        
        setTimeout(() => {
          let msg = `${rows.length}件の発送完了データを登録しました`;
          if (matchedCount > 0) {

    // 出荷予定CSVエクスポート
    function exportShukkaYoteiCSV() {
      if (shukkaYoteiData.length === 0) {
        alert('エクスポートするデータがありません');
        return;
      }
      
      let csv = '取引先コード,出荷指示日,出荷先名称,出荷先住所,出荷先郵便番号,出荷先電話番号,商品名,商品番号,SKU,個数,オプション1,オプション2,オプション3,オプション4,オプション5,登録日時,ステータス\n';
      
      shukkaYoteiData.forEach(data => {
        csv += `${data.取引先コード || ''},${data.出荷指示日 || ''},${data.出荷先名称 || ''},${data.出荷先住所 || ''},${data.出荷先郵便番号 || ''},${data.出荷先電話番号 || ''},${data.商品名 || ''},${data.商品番号 || ''},${data.SKU || ''},${data.個数 || ''},${data.オプション1 || ''},${data.オプション2 || ''},${data.オプション3 || ''},${data.オプション4 || ''},${data.オプション5 || ''},${data.登録日時 || ''},${data.ステータス || ''}\n`;
      });
      
      // BOMを追加してExcelで文字化けを防ぐ
      const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
      const blob = new Blob([bom, csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      
      link.setAttribute('href', url);
      link.setAttribute('download', '出荷予定一覧_' + new Date().toISOString().slice(0, 10) + '.csv');
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // ロケ振りを実行
    function executeLokefuri() {
      const newTanaInput = document.getElementById('loke-new-tana-input');
      const newTana = newTanaInput.value.trim();
      
      if (!newTana) {
        alert('新しい棚番号を入力してください');
        return;
      }
      
      if (newTana === window.lokefuriState.currentTana) {
        alert('現在の棚番号と同じ棚番号は指定できません');
        return;
      }
      
      const { currentTana, sku } = window.lokefuriState;
      
      // 該当の在庫を検索して棚番号を更新（常に1個を移動）
      let moved = false;

      // 1) 在庫一覧の主データ（registeredData）を優先して更新
      const registeredIndex = registeredData.findIndex(r =>
        r.棚番号 === currentTana &&
        r.SKU === sku &&
        (r.在庫ステータス === '販売中' || r.在庫ステータス === '販売待')
      );

      if (registeredIndex !== -1) {
        registeredData[registeredIndex].棚番号 = newTana;

        // 対応する検品データがあれば同期更新
        const syncedKenpin = kenpinData.find(k =>
          k.ステータス === '検品OK' &&
          k.棚番号 === currentTana &&
          k.SKU === sku &&
          (!registeredData[registeredIndex].荷物番号 || k.荷物番号 === registeredData[registeredIndex].荷物番号)
        );
        if (syncedKenpin) {
          syncedKenpin.棚番号 = newTana;
        }

        moved = true;
      }

      // 2) registeredData で見つからない場合は従来通り kenpinData で更新
      if (!moved) {
        for (let i = 0; i < kenpinData.length; i++) {
          if (kenpinData[i].ステータス === '検品OK' &&
              kenpinData[i].棚番号 === currentTana &&
              kenpinData[i].SKU === sku) {
            kenpinData[i].棚番号 = newTana;

            const registeredItem = registeredData.find(r =>
              r.SKU === sku &&
              (!kenpinData[i].荷物番号 || r.荷物番号 === kenpinData[i].荷物番号)
            );
            if (registeredItem) {
              registeredItem.棚番号 = newTana;
            }

            moved = true;
            break;
          }
        }
      }
      
      if (moved) {
        alert(`1個を「${currentTana}」から「${newTana}」へ移動しました`);
        
        // フォームをクリアして再表示
        clearLokefuriForm();
      } else {
        alert('指定された在庫が見つかりません');
      }
    }

    function showLokeMessage(message) {
      const messageDiv = document.getElementById('loke-info-message');
      const messageP = messageDiv.querySelector('p');
      messageP.textContent = message;
      messageDiv.classList.remove('hidden');
    }
    
    // グローバル変数: 出荷予定データ
    let shukkaYoteiData = [];
    
    // グローバル変数: 現在のプラットフォームタイプ
    let currentShukkaType = 'garagesale'; // デフォルト: ガレージセール
    
    // グローバル変数: 引当情報（SKUと荷物番号の組み合わせごとの引当数）
    let hikiateInfo = new Map(); // キー: "SKU_荷物番号", 値: 引当数
    
    // グローバル変数: 出荷管理番号カウンター
    let shukkaKanriBangouCounter = 1;
    
    // グローバル変数: 出荷管理番号マップ（出荷指示日+出荷先名称 -> 出荷管理番号）
    let shukkaKanriBangouMap = new Map();
    
    // 出荷管理番号を生成または取得する関数
    // 出荷指示日と出荷先名称が同じ場合は同じ出荷管理番号を返す
    function generateShukkaKanriBangou(shukkaShijiDate, shukkaSakiName) {
      // キーを生成（出荷指示日_出荷先名称）
      const key = `${shukkaShijiDate}_${shukkaSakiName}`;
      
      // 既に同じ組み合わせの出荷管理番号が存在する場合はそれを返す
      if (shukkaKanriBangouMap.has(key)) {
        return shukkaKanriBangouMap.get(key);
      }
      
      // 新しい出荷管理番号を生成
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, '0');
      const day = String(today.getDate()).padStart(2, '0');
      const seqNo = String(shukkaKanriBangouCounter).padStart(6, '0');
      shukkaKanriBangouCounter++;
      const newBangou = `S${year}${month}${day}-${seqNo}`;
      
      // マップに保存

    // ピッキングスキャン処理
    function processPickingScan(index, expectedTanaBangou, expectedSku) {
      const input = document.getElementById('scan-input');
      const scannedValue = input.value.trim();
      
      if (!scannedValue) {
        alert('値を入力してください');
        return;
      }
      
      const state = window.pickingState;
      const scanHistory = document.getElementById('scan-history');
      
      if (state.step === 1) {
        // ステップ1: カート間口番号をスキャン
        state.cartMaguchi = scannedValue;
        
        // 履歴に追加
        const historyItem = document.createElement('div');
        historyItem.className = 'flex items-center gap-2 p-2 bg-green-50 border border-green-200 rounded';
        historyItem.innerHTML = `
          <i data-lucide="check-circle" class="w-5 h-5 text-green-600"></i>
          <span class="text-sm"><strong>カート間口番号:</strong> ${scannedValue}</span>
        `;
        scanHistory.appendChild(historyItem);
        
        // 次のステップへ
        updatePickingStep(2);
        input.value = '';
        input.focus();
        lucide.createIcons();
        
      } else if (state.step === 2) {
        // ステップ2: 棚番号をスキャン
        if (scannedValue !== expectedTanaBangou) {
          alert(`棚番号が一致しません\n期待値: ${expectedTanaBangou}\nスキャン値: ${scannedValue}`);
          input.value = '';
          input.focus();
          return;
        }
        
        state.tanaBangou = scannedValue;
        
        // 履歴に追加
        const historyItem = document.createElement('div');
        historyItem.className = 'flex items-center gap-2 p-2 bg-green-50 border border-green-200 rounded';
        historyItem.innerHTML = `
          <i data-lucide="check-circle" class="w-5 h-5 text-green-600"></i>
          <span class="text-sm"><strong>棚番号:</strong> ${scannedValue} ✓</span>
        `;
        scanHistory.appendChild(historyItem);
        
        // 次のステップへ
        updatePickingStep(3);
        input.value = '';
        input.focus();
        lucide.createIcons();
        
      } else if (state.step === 3) {
        // ステップ3: SKUをスキャン
        if (scannedValue !== expectedSku) {
          alert(`SKUが一致しません\n期待値: ${expectedSku}\nスキャン値: ${scannedValue}`);
          input.value = '';
          input.focus();
          return;

        state.sku = scannedValue;

        // ステップ4: 間口番号確認（最初にスキャンした間口番号と一致するか確認）
        if (scannedValue !== state.cartMaguchi) {
          alert(`間口番号が一致しません\n期待値: ${state.cartMaguchi}\nスキャン値: ${scannedValue}`);
          input.value = '';
          input.focus();

    // ピッキングステップを更新
    function updatePickingStep(step) {
      window.pickingState.step = step;
      
      const scanLabel = document.getElementById('scan-label');
      const scanHint = document.getElementById('scan-hint');
      
      // インジケーターの更新
      for (let i = 1; i <= 4; i++) {
        const indicator = document.getElementById(`step-${i}-indicator`);
        const text = document.getElementById(`step-${i}-text`);
        const progress = document.getElementById(`progress-${i}`);
        
        if (i < step) {
          // 完了済み
          indicator.className = 'w-8 h-8 rounded-full bg-green-600 text-white flex items-center justify-center font-semibold text-sm';
          text.className = 'font-medium text-green-600';
          if (progress) progress.className = 'flex-1 mx-2 h-1 bg-green-600';
        } else if (i === step) {
          // 現在のステップ
          indicator.className = 'w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-semibold text-sm';
          text.className = 'font-medium text-blue-600';
        } else {
          // 未完了
          indicator.className = 'w-8 h-8 rounded-full bg-gray-300 text-white flex items-center justify-center font-semibold text-sm';
          text.className = 'font-medium text-gray-400';
          if (progress) progress.className = 'flex-1 mx-2 h-1 bg-gray-200';
        }
      }
      
      // ラベルとヒントの更新
      if (step === 2) {
        scanLabel.textContent = 'ステップ2: 棚番号をスキャンしてください';
        scanHint.textContent = `期待値: ${window.pickingState.expectedTanaBangou}`;
      } else if (step === 3) {
        scanLabel.textContent = 'ステップ3: SKUをスキャンしてください';
        scanHint.textContent = `期待値: ${window.pickingState.expectedSku}`;
      } else if (step === 4) {
        scanLabel.textContent = 'ステップ4: 間口番号を再度スキャンして確認してください';
        scanHint.textContent = `期待値: ${window.pickingState.cartMaguchi}`;
      }
    }
    
    // スキャン完了後のピッキング処理
    function completePickingWithScan(index) {
      const data = shukkaYoteiData[index];
      const pickingCount = window.pickingState.remaining;
      const requiredCount = parseInt(data.個数) || 0;
      const currentPicked = data.ピッキング数 || 0;
      
      // ピッキング数を更新
      shukkaYoteiData[index].ピッキング数 = currentPicked + pickingCount;
      
      // 間口番号を保存
      if (!shukkaYoteiData[index].間口番号) {
        shukkaYoteiData[index].間口番号 = window.pickingState.cartMaguchi;
      }
      
      // すべてピッキング完了した場合、ステータスを「ピッキング完了」に変更
      if (shukkaYoteiData[index].ピッキング数 >= requiredCount) {
        shukkaYoteiData[index].ステータス = 'ピッキング完了';
      }
      
      // 成功メッセージ
      setTimeout(() => {
        alert(`ピッキング完了！\n\n出荷管理番号: ${data.出荷管理番号}\nカート間口: ${window.pickingState.cartMaguchi}\n棚番号: ${window.pickingState.tanaBangou}\nSKU: ${window.pickingState.sku}\nピッキング数: ${pickingCount}`);
        
        closePickingModal();
        displayPickingData();
      }, 300);
    }

    // ピッキング対象を読み込む
    function loadPickingTarget() {
      const input = document.getElementById('picking-shukka-kanri-input');
      const shukkaKanriBangou = input.value.trim();
      
      if (!shukkaKanriBangou) {
        alert('出荷管理番号を入力してください');
        return;
      }
      
      // 出荷管理番号に一致するデータを検索（出荷予定のみ）
      const targetItems = shukkaYoteiData.filter(data => 
        data.出荷管理番号 === shukkaKanriBangou && data.ステータス === '出荷予定'
      );
      
      if (targetItems.length === 0) {
        alert('該当する出荷予定データが見つかりません。\n出荷管理番号: ' + shukkaKanriBangou);
        return;
      }
      
      // ピッキング状態を初期化
      window.pickingSagyoState = {
        shukkaKanriBangou: shukkaKanriBangou,
        items: targetItems.map((item, idx) => {
          const kenpinOkItems = kenpinData.filter(k => k.ステータス === '検品OK' && k.SKU === item.SKU);
          const tanaBangou = kenpinOkItems.length > 0 ? kenpinOkItems[0].棚番号 : '';
          const originalIndex = shukkaYoteiData.findIndex(d => d === item);
          return {
            originalIndex: originalIndex,
            商品名: item.商品名,
            商品番号: item.商品番号,
            SKU: item.SKU,
            棚番号: tanaBangou,
            必要数: parseInt(item.個数) || 0,
            ピッキング数: item.ピッキング数 || 0,
            completed: false
          };
        }),
        currentItemIndex: 0,
        step: 1,
        cartMaguchi: '',
        tanaBangou: '',
        sku: '',
        confirmMaguchi: ''
      };
      
      // 対象エリアを表示
      document.getElementById('picking-target-area').classList.remove('hidden');
      
      // 対象商品一覧を表示
      displayPickingTargetList();
      
      // 最初の未完了アイテムを設定
      startNextPickingItem();
    }
    
    // ピッキング対象商品一覧を表示
    function displayPickingTargetList() {
      const state = window.pickingSagyoState;
      if (!state) return;
      
      const tbody = document.getElementById('picking-target-body');
      tbody.innerHTML = '';
      
      let completedCount = 0;
      
      state.items.forEach((item, index) => {
        const isCompleted = item.completed;
        const isCurrent = index === state.currentItemIndex && !isCompleted;
        if (isCompleted) completedCount++;
        
        const row = document.createElement('tr');
        row.className = isCurrent ? 'bg-blue-50' : (isCompleted ? 'bg-green-50' : '');
        row.innerHTML = `
          <td class="px-4 py-3 border-r border-gray-200">
            ${isCompleted ? '<i data-lucide="check-circle" class="w-5 h-5 text-green-600"></i>' : 
              (isCurrent ? '<i data-lucide="arrow-right" class="w-5 h-5 text-blue-600"></i>' : 
              '<i data-lucide="circle" class="w-5 h-5 text-gray-300"></i>')}
          </td>
          <td class="px-4 py-3 border-r border-gray-200 text-sm">${item.商品名 || ''}</td>
          <td class="px-4 py-3 border-r border-gray-200 text-sm">${item.商品番号 || ''}</td>
          <td class="px-4 py-3 border-r border-gray-200 text-sm font-mono">${item.SKU || ''}</td>
          <td class="px-4 py-3 border-r border-gray-200 text-sm font-semibold text-purple-600">${item.棚番号 || '-'}</td>
          <td class="px-4 py-3 border-r border-gray-200 text-sm text-center">${item.必要数}</td>
          <td class="px-4 py-3 text-sm text-center ${isCompleted ? 'text-green-600 font-semibold' : ''}">${item.ピッキング数}</td>
        `;
        tbody.appendChild(row);
      });
      
      // 進捗を更新
      const progressPercent = state.items.length > 0 ? (completedCount / state.items.length) * 100 : 0;
      document.getElementById('picking-progress-bar').style.width = progressPercent + '%';
      document.getElementById('picking-progress-text').textContent = completedCount + ' / ' + state.items.length + ' 完了';
      
      lucide.createIcons();
    }
    
    // 次のピッキングアイテムを開始
    function startNextPickingItem() {
      const state = window.pickingSagyoState;
      if (!state) return;
      
      // 未完了のアイテムを探す
      const nextIndex = state.items.findIndex(item => !item.completed);
      
      if (nextIndex === -1) {
        // 全て完了
        completeAllPicking();
        return;
      }
      
      state.currentItemIndex = nextIndex;
      state.step = 1;
      state.cartMaguchi = '';
      state.tanaBangou = '';
      state.sku = '';
      state.confirmMaguchi = '';
      
      const item = state.items[nextIndex];
      
      // 現在のアイテム情報を表示
      document.getElementById('current-item-name').textContent = item.商品名 || '-';
      document.getElementById('current-item-sku').textContent = item.SKU || '-';
      document.getElementById('current-item-tana').textContent = item.棚番号 || '-';
      document.getElementById('current-item-required').textContent = item.必要数;
      document.getElementById('current-item-picked').textContent = item.ピッキング数;
      
      // ステップを初期化
      updateSagyoStep(1);
      
      // スキャン履歴をクリア
      document.getElementById('sagyo-scan-history').innerHTML = '';
      
      // 入力欄をクリアしてフォーカス
      const scanInput = document.getElementById('sagyo-scan-input');
      if (scanInput) {
        scanInput.value = '';
        scanInput.focus();
      }
      
      // 一覧を更新
      displayPickingTargetList();
    }
    
    // ピッキング作業のスキャン処理
    function processSagyoScan() {
      const input = document.getElementById('sagyo-scan-input');
      const scannedValue = input.value.trim();
      
      if (!scannedValue) {
        alert('値を入力してください');
        return;
      }
      
      const state = window.pickingSagyoState;
      if (!state) return;
      
      const currentItem = state.items[state.currentItemIndex];
      const scanHistory = document.getElementById('sagyo-scan-history');
      
      if (state.step === 1) {
        // ステップ1: カート間口番号をスキャン
        state.cartMaguchi = scannedValue;
        
        // 履歴に追加
        const historyItem = document.createElement('div');
        historyItem.className = 'flex items-center gap-2 p-2 bg-green-50 border border-green-200 rounded';
        historyItem.innerHTML = `
          <i data-lucide="check-circle" class="w-5 h-5 text-green-600"></i>
          <span class="text-sm"><strong>カート間口番号:</strong> ${scannedValue}</span>
        `;
        scanHistory.appendChild(historyItem);
        
        // 次のステップへ
        updateSagyoStep(2);
        input.value = '';
        input.focus();
        lucide.createIcons();
        
      } else if (state.step === 2) {
        // ステップ2: 棚番号をスキャン
        if (scannedValue !== currentItem.棚番号) {
          alert('棚番号が一致しません\n期待値: ' + currentItem.棚番号 + '\nスキャン値: ' + scannedValue);
          input.value = '';
          input.focus();
          return;
        }
        
        state.tanaBangou = scannedValue;
        
        // 履歴に追加
        const historyItem = document.createElement('div');
        historyItem.className = 'flex items-center gap-2 p-2 bg-green-50 border border-green-200 rounded';
        historyItem.innerHTML = `
          <i data-lucide="check-circle" class="w-5 h-5 text-green-600"></i>
          <span class="text-sm"><strong>棚番号:</strong> ${scannedValue} ✓</span>
        `;
        scanHistory.appendChild(historyItem);
        
        // 次のステップへ
        updateSagyoStep(3);
        input.value = '';
        input.focus();
        lucide.createIcons();
        
      } else if (state.step === 3) {
        // ステップ3: SKUをスキャン
        if (scannedValue !== currentItem.SKU) {
          alert('SKUが一致しません\n期待値: ' + currentItem.SKU + '\nスキャン値: ' + scannedValue);
          input.value = '';
          input.focus();
          return;
        }
        
        state.sku = scannedValue;
        
        // 履歴に追加
        const historyItem = document.createElement('div');
        historyItem.className = 'flex items-center gap-2 p-2 bg-green-50 border border-green-200 rounded';
        historyItem.innerHTML = `
          <i data-lucide="check-circle" class="w-5 h-5 text-green-600"></i>
          <span class="text-sm"><strong>SKU:</strong> ${scannedValue} ✓</span>
        `;
        scanHistory.appendChild(historyItem);
        
        // 次のステップへ
        updateSagyoStep(4);
        input.value = '';
        input.focus();
        lucide.createIcons();
        
      } else if (state.step === 4) {
        // ステップ4: 間口番号確認
        if (scannedValue !== state.cartMaguchi) {
          alert('間口番号が一致しません\n期待値: ' + state.cartMaguchi + '\nスキャン値: ' + scannedValue);
          input.value = '';
          input.focus();
          return;
        }
        
        state.confirmMaguchi = scannedValue;
        
        // 履歴に追加
        const historyItem = document.createElement('div');
        historyItem.className = 'flex items-center gap-2 p-2 bg-green-50 border border-green-200 rounded';
        historyItem.innerHTML = `
          <i data-lucide="check-circle" class="w-5 h-5 text-green-600"></i>
          <span class="text-sm"><strong>間口番号確認:</strong> ${scannedValue} ✓</span>
        `;
        scanHistory.appendChild(historyItem);
        lucide.createIcons();
        
        // このアイテムのピッキングを完了
        completeSagyoPickingItem();
      }
    }
    
    // ピッキング作業のステップを更新
    function updateSagyoStep(step) {
      const state = window.pickingSagyoState;
      if (!state) return;
      
      state.step = step;
      
      const scanLabel = document.getElementById('sagyo-scan-label');
      const scanHint = document.getElementById('sagyo-scan-hint');
      const currentItem = state.items[state.currentItemIndex];
      
      // インジケーターの更新
      for (let i = 1; i <= 4; i++) {
        const indicator = document.getElementById('sagyo-step-' + i + '-indicator');
        const text = document.getElementById('sagyo-step-' + i + '-text');
        const progress = document.getElementById('sagyo-progress-' + i);
        
        if (i < step) {
          // 完了済み
          indicator.className = 'w-8 h-8 rounded-full bg-green-600 text-white flex items-center justify-center font-semibold text-sm';
          text.className = 'font-medium text-green-600';
          if (progress) progress.className = 'flex-1 mx-2 h-1 bg-green-600';
        } else if (i === step) {
          // 現在のステップ
          indicator.className = 'w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-semibold text-sm';
          text.className = 'font-medium text-blue-600';
        } else {
          // 未完了
          indicator.className = 'w-8 h-8 rounded-full bg-gray-300 text-white flex items-center justify-center font-semibold text-sm';
          text.className = 'font-medium text-gray-400';
          if (progress) progress.className = 'flex-1 mx-2 h-1 bg-gray-200';
        }
      }
      
      // ラベルとヒントの更新
      if (step === 1) {
        scanLabel.textContent = 'ステップ1: カート間口番号をスキャンしてください';
        scanHint.textContent = '例: 001, 002, 003 など';
      } else if (step === 2) {
        scanLabel.textContent = 'ステップ2: 棚番号をスキャンしてください';
        scanHint.textContent = '期待値: ' + currentItem.棚番号;
      } else if (step === 3) {

    // ファイル選択時の処理
    function handleShukkaFileSelect(event) {
      const file = event.target.files[0];
      if (file) {

    // CSV解析とテーブルへの追加
    function parseShukkaCSV(text) {
      const lines = text.split('\n');
      const tbody = document.getElementById('data-grid-body-shukka');
      
      // 「データなし」メッセージを削除
      const noDataMessage = document.getElementById('no-data-message-shukka');
      if (noDataMessage) {
        noDataMessage.remove();
      }
      
      let importedCount = 0;
      const bangouGroups = new Map(); // 出荷管理番号ごとのグループ化
      
      // ヘッダー行の判定: 1行目が数値で始まるかどうかでヘッダーの有無を判定
      let startIndex = 0;
      if (lines.length > 0) {
        const firstLine = lines[0].trim();
        if (firstLine) {
          const firstColumns = parseCSVLine(firstLine);
          // 1列目が数値でなければヘッダー行と判断してスキップ
          if (firstColumns.length > 0 && isNaN(firstColumns[0].trim())) {
            startIndex = 1;
          }
        }
      }
      
      // ヤフオク用の処理
      if (currentTorokPlatform === 'yahoo') {
        for (let i = startIndex; i < lines.length; i++) {
          const line = lines[i].trim();
          if (line) {
            const columns = parseCSVLine(line);
            // OrderId, OrderTime, UnitPrice, Title のみを使用
            if (columns.length >= 39) {
              const orderId = columns[0].trim();
              const orderTime = columns[1].trim();
              let unitPriceRaw = columns[37].trim();
              let titleRaw = columns[38].trim();
              
              // UnitPrice: L1=を削除して数字のみを抽出
              const unitPrice = unitPriceRaw.replace(/^L1=/, '').trim();
              
              // Title: RXBIで始まる文字列を分離
              let shohinMei = titleRaw;
              let kanriNo = '';
              const rxbiMatch = titleRaw.match(/(.+?)\s*(RXBI\d+)\s*$/);
              if (rxbiMatch) {
                shohinMei = rxbiMatch[1].replace(/^L1=/, '').trim();
                kanriNo = rxbiMatch[2];
              }
              
              const row = document.createElement('tr');
              row.className = 'hover:bg-gray-50 transition-colors duration-150 imported-row';
              row.innerHTML = `
                <td class="px-6 py-4 text-sm text-gray-900">${orderId}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${orderTime}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${unitPrice}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${shohinMei}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${kanriNo}</td>
              `;
              tbody.appendChild(row);
              importedCount++;
            }
          }
        }
      } else {
        // その他のプラットフォーム用の従来の処理
        for (let i = startIndex; i < lines.length; i++) {
          const line = lines[i].trim();
          if (line) {
            const columns = parseCSVLine(line);
            if (columns.length >= 16) {
              // 関連番号項目と品番を取得
              const kanrenBangou = columns[1].trim(); // 関連番号項目（空の場合もある）
              const hinban = columns[2].trim();  // 品番
              
              // 関連番号項目を管理番号として使用（空の場合は出荷先コード+品番で代替キー生成）
              const shukkaKanriBangou = kanrenBangou || '';
              
              // 出荷管理番号のグループをカウント（空文字も含む）
              const groupKey = kanrenBangou || `_nokanren_${columns[0].trim()}_${hinban}`;
              if (!bangouGroups.has(groupKey)) {
                bangouGroups.set(groupKey, []);
              }
              bangouGroups.get(groupKey).push({
                date: kanrenBangou,
                destination: hinban
              });
              
              const row = document.createElement('tr');
              row.className = 'hover:bg-gray-50 transition-colors duration-150 imported-row';
              row.setAttribute('data-shukka-bangou', shukkaKanriBangou);
              row.setAttribute('data-shukka-date', kanrenBangou);
              row.setAttribute('data-shukka-saki', hinban);
              row.innerHTML = `
                <td class="px-6 py-4 text-sm text-gray-900">${columns[0]}</td>
                <td class="px-6 py-4 text-sm ${kanrenBangou ? 'text-blue-600 font-semibold' : 'text-gray-400 italic'}">${kanrenBangou || '（なし）'}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[2]}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[3]}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[4]}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[5]}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[6]}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[7]}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[8]}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[9]}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[10]}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[11]}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[12]}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[13]}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[14]}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[15]}</td>
                <td class="px-6 py-4 text-sm text-gray-900">${columns[16] || ''}</td>
              `;
              tbody.appendChild(row);
              importedCount++;
            }
          }
        }
      }
      
      // データ登録ボタンを有効化
      const registerButton = document.getElementById('register-button-shukka');
      if (registerButton) {
        registerButton.disabled = false;
      }
      
      // 件数表示を更新
      updateShukkaRowCount();
      
      // インポート結果のメッセージを作成
      let message = `CSVファイルをインポートしました (${importedCount}件)\n`;
      if (currentTorokPlatform !== 'yahoo' && bangouGroups.size < importedCount) {
        message += `\n関連番号項目: ${bangouGroups.size}件\n`;
        message += `(同一の関連番号項目でグループ化されました)`;
      }
      
      alert(message);
      
      // アイコンを再初期化
      lucide.createIcons();
    }

    // 品番から在庫一覧の棚番号を取得する関数
    function getTanaBanFromZaiko(hinban) {
      // registeredData内で品番（商品番号）と一致するデータから棚番号を取得
      if (!registeredData || registeredData.length === 0) {
        return null;
      }
      
      // 品番が一致するデータを探す
      const matchedItem = registeredData.find(item => {
        return item.商品番号 && item.商品番号.toString() === hinban.toString();
      });
      
      // 一致したアイテムが見つかれば、棚番号を返す
      if (matchedItem && matchedItem.棚番号) {

      }
      
      return null;
