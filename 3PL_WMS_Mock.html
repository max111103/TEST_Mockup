  <!-- Main Content -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200 px-8" style="height: 73px;">
      <div class="flex items-center justify-between h-full">
        <div class="flex items-center gap-4">
          <h1 id="page-title" class="text-xl font-semibold text-gray-800">ダッシュボード</h1>
        </div>
        <div class="flex items-center gap-4 relative">
          <!-- ユーザーアイコン -->
          <button id="user-button" class="flex items-center gap-2 p-2 hover:bg-gray-100 rounded-lg transition-colors duration-200" onclick="toggleUserMenu()">
            <span class="text-sm font-medium text-gray-700">ユーザー</span>
            <i data-lucide="user-circle" class="w-5 h-5 text-gray-600"></i>
          </button>
          <!-- ユーザーメニュー -->
          <div id="user-menu" class="hidden absolute top-full right-0 mt-2 w-40 bg-white border border-gray-200 rounded-lg shadow-lg z-50">
            <button onclick="showLogoutConfirm()" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 first:rounded-t-lg flex items-center gap-2">
              <i data-lucide="log-out" class="w-4 h-4"></i>
              ログアウト
            </button>
          </div>
        </div>
      </div>
    </header>
    <!-- Content Area -->
    <div id="content-area" class="flex-1 p-4 overflow-y-auto">
    </div>
  </main>

  <!-- ログアウト確認モーダル -->
  <div id="logout-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl p-6 max-w-sm w-full mx-4 text-center">
      <div class="flex justify-center mb-4">
        <i data-lucide="alert-circle" class="w-6 h-6 text-yellow-600"></i>
      </div>
      <h2 class="text-lg font-semibold text-gray-800 mb-4">ログアウト確認</h2>
      <p class="text-gray-600 mb-6">ログアウトしますか？</p>
      <div class="flex gap-3 justify-center">
        <button onclick="closeLogoutModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors duration-200 font-medium">
          キャンセル
        </button>
        <button onclick="performLogout()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors duration-200 font-medium flex items-center gap-2">
          <i data-lucide="log-out" class="w-4 h-4"></i>
          ログアウトする
        </button>
      </div>
    </div>
  </div>

  <script>
    // DOMの読み込み完了後にアイコンを初期化
    document.addEventListener('DOMContentLoaded', function() {
      lucide.createIcons();
    });
    
    // ページ読み込み時にもアイコンを初期化
    lucide.createIcons();
    
    // ユーザーメニューの表示/非表示を切り替え
    function toggleUserMenu() {
      const userMenu = document.getElementById('user-menu');
      userMenu.classList.toggle('hidden');
      lucide.createIcons();
    }
    
    // ページ上のどこかをクリックしたときはメニューを閉じる
    document.addEventListener('click', function(event) {
      const userButton = document.getElementById('user-button');
      const userMenu = document.getElementById('user-menu');
      if (!userButton.contains(event.target) && !userMenu.contains(event.target)) {
        userMenu.classList.add('hidden');
      }
    });
    
    // ログアウト確認ダイアログを表示
    function showLogoutConfirm() {
      const logoutModal = document.getElementById('logout-modal');
      logoutModal.classList.remove('hidden');
      document.getElementById('user-menu').classList.add('hidden');
      lucide.createIcons();
    }
    
    // ログアウト確認ダイアログを閉じる
    function closeLogoutModal() {
      const logoutModal = document.getElementById('logout-modal');
      logoutModal.classList.add('hidden');
    }
    
    // ログアウト実行
    function performLogout() {
      // セッション情報をクリア
      sessionStorage.removeItem('isLoggedIn');
      sessionStorage.removeItem('userId');
      sessionStorage.removeItem('loginTime');
      
      // ログイン画面に遷移
      window.location.href = 'login.html';
    }
    
    // サイドバーの状態管理
    const sidebar = document.getElementById('sidebar');
    const nav = sidebar.querySelector('nav');
    
    // サイドバーを展開する関数
    function expandSidebar() {
      const menuTexts = document.querySelectorAll('.menu-text');
      const titleFull = document.getElementById('sidebar-title-full');
      const titleShort = document.getElementById('sidebar-title-short');
      const arrows = document.querySelectorAll('[id$="-arrow"]');
      
      sidebar.classList.remove('w-20');
      sidebar.classList.add('w-72');
      nav.classList.remove('p-2');
      nav.classList.add('p-4');
      menuTexts.forEach(text => {
        text.style.opacity = '1';
        text.style.display = 'inline';
      });
      
      // タイトルの切り替え
      titleShort.style.opacity = '0';
      titleShort.style.display = 'none';
      titleFull.style.display = 'block';
      titleFull.style.opacity = '1';
      
      arrows.forEach(arrow => arrow.style.display = 'block');
    }
    
    // サイドバーを折りたたむ関数
    function collapseSidebar() {
      const menuTexts = document.querySelectorAll('.menu-text');
      const titleFull = document.getElementById('sidebar-title-full');
      const titleShort = document.getElementById('sidebar-title-short');
      const arrows = document.querySelectorAll('[id$="-arrow"]');
      const submenus = document.querySelectorAll('[id$="-submenu"]');
      
      sidebar.classList.remove('w-72');
      sidebar.classList.add('w-20');
      nav.classList.remove('p-4');
      nav.classList.add('p-2');
      menuTexts.forEach(text => {
        text.style.opacity = '0';
        setTimeout(() => text.style.display = 'none', 300);
      });
      
      // タイトルの切り替え
      titleFull.style.opacity = '0';
      titleFull.style.display = 'none';
      titleShort.style.display = 'block';
      titleShort.style.opacity = '1';
      
      arrows.forEach(arrow => arrow.style.display = 'none');
      // サブメニューも閉じる
      submenus.forEach(submenu => submenu.classList.add('hidden'));
    }
    
    // マウスオーバーでサイドバーを展開
    sidebar.addEventListener('mouseenter', function() {
      expandSidebar();
    });
    
    // マウスアウトでサイドバーを折りたたむ
    sidebar.addEventListener('mouseleave', function() {
      collapseSidebar();
    });
    
    // 入荷管理のサブメニューの表示/非表示を切り替える

    // ファイル選択時の処理
    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const text = e.target.result;
          parseCSV(text);
        };
        reader.readAsText(file, 'UTF-8');
      }
    }
    
    // CSV解析とテーブルへの追加
    function parseCSV(text) {
      const lines = text.split('\n');
      const tbody = document.getElementById('data-grid-body');
      
      // 「データなし」メッセージを削除
      const noDataMessage = document.getElementById('no-data-message');
      if (noDataMessage) {
        noDataMessage.remove();
      }
      
      let importedCount = 0;
      
      // ヘッダー行をスキップして2行目から処理
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line) {
          const columns = line.split(',');
          if (columns.length >= 14) {
            const row = document.createElement('tr');
            row.className = 'hover:bg-gray-50 transition-colors duration-150 imported-row';
            row.innerHTML = `
              <td class="px-6 py-4 text-sm text-gray-900">${columns[0]}</td>
              <td class="px-6 py-4 text-sm text-gray-900">${columns[1]}</td>
              <td class="px-6 py-4 text-sm text-gray-900">${columns[2]}</td>
              <td class="px-6 py-4 text-sm text-gray-900">${columns[3]}</td>
              <td class="px-6 py-4 text-sm text-gray-900">${columns[4]}</td>
              <td class="px-6 py-4 text-sm text-gray-900">${columns[5]}</td>
              <td class="px-6 py-4 text-sm text-gray-900">${columns[6]}</td>
              <td class="px-6 py-4 text-sm text-gray-900">${columns[7]}</td>
              <td class="px-6 py-4 text-sm text-gray-900">${columns[8]}</td>
              <td class="px-6 py-4 text-sm text-gray-900">${columns[9]}</td>
              <td class="px-6 py-4 text-sm text-gray-900">${columns[10]}</td>
              <td class="px-6 py-4 text-sm text-gray-900">${columns[11]}</td>
              <td class="px-6 py-4 text-sm text-gray-900">${columns[12]}</td>
              <td class="px-6 py-4 text-sm text-gray-900">${columns[13]}</td>
            `;
            tbody.appendChild(row);
            importedCount++;
          }
        }
      }
      
      // データ登録ボタンを有効化
      const registerButton = document.getElementById('register-button');
      if (registerButton) {
        registerButton.disabled = false;
      }
      
      // 件数表示を更新
      updateRowCount();
      
      alert(`CSVファイルをインポートしました (${importedCount}件)`);
      
      // アイコンを再初期化
      lucide.createIcons();
    }
    
    // 行数カウントを更新
    function updateRowCount() {
      const tbody = document.getElementById('data-grid-body');
      const rows = tbody.querySelectorAll('tr:not(#no-data-message)');
      const totalCount = rows.length;
      
      const totalCountElement = document.getElementById('total-count');
      const displayRangeElement = document.getElementById('display-range');
      
      if (totalCountElement && displayRangeElement) {
        totalCountElement.textContent = totalCount;
        if (totalCount > 0) {
          displayRangeElement.textContent = `1-${totalCount}`;
        } else {
          displayRangeElement.textContent = '0-0';
        }
      }
    }
    
    // データ登録機能
    function registerData() {
      const tbody = document.getElementById('data-grid-body');
      const rows = tbody.querySelectorAll('tr');
      
      if (rows.length === 0) {
        alert('登録するデータがありません');
        return;
      }
      
      // データ登録処理のシミュレーション
      const confirmResult = confirm(`${rows.length}件のデータを登録します。よろしいですか?`);
      
      if (confirmResult) {
        // データをグローバル配列に保存
        rows.forEach(row => {
          const cells = row.querySelectorAll('td');
          if (cells.length >= 14) {
            const rowData = {
              取引先コード: cells[0].textContent.trim(),
              取引先名: cells[1].textContent.trim(),
              発送元出荷日: cells[2].textContent.trim(),
              入庫予定日: cells[3].textContent.trim(),
              商品名: cells[4].textContent.trim(),
              商品番号: cells[5].textContent.trim(),
              SKU: cells[6].textContent.trim(),
              個数: cells[7].textContent.trim(),
              オプション1: cells[8].textContent.trim(),
              オプション2: cells[9].textContent.trim(),
              オプション3: cells[10].textContent.trim(),
              オプション4: cells[11].textContent.trim(),
              オプション5: cells[12].textContent.trim(),
              荷物番号: cells[13].textContent.trim(),
              登録日時: new Date().toLocaleString('ja-JP'),
              在庫ステータス: '入荷予定'
            };
            registeredData.push(rowData);
          }
        });
        
        // ここで実際のデータベース登録処理を行う
        // 現在はシミュレーションとしてアラートを表示
        setTimeout(() => {
          alert(`${rows.length}件のデータを登録しました`);
          
          // データをクリア
          tbody.innerHTML = `
            <tr id="no-data-message">
              <td colspan="14" class="px-6 py-12 text-center">
                <div class="flex flex-col items-center justify-center text-gray-500">

                </div>
              </td>
            </tr>
          `;
          
          // データ登録ボタンを無効化
          const registerButton = document.getElementById('register-button');
          if (registerButton) {
            registerButton.disabled = true;
          }
          
          // 件数表示を更新
          updateRowCount();
          
          // アイコンを再初期化
          lucide.createIcons();
        }, 500);
      }
    }
    
    // CSVエクスポート機能
    function exportCSV() {
      const table = document.querySelector('table');
      const rows = table.querySelectorAll('tbody tr');
      
      let csv = '取引先コード,取引先名,発送元出荷日,入庫予定日,商品名,商品番号,SKU,個数,オプション1,オプション2,オプション3,オプション4,オプション5,荷物番号\n';
      
      rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        const rowData = [];
        for (let i = 0; i < cells.length; i++) { // すべての列を含める
          rowData.push(cells[i].textContent.trim());
        }
        csv += rowData.join(',') + '\n';
      });
      
      // BOMを追加してExcelで文字化けを防ぐ
      const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
      const blob = new Blob([bom, csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      
      link.setAttribute('href', url);
      link.setAttribute('download', '入荷予定登録_' + new Date().toISOString().slice(0, 10) + '.csv');
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

      const searchTorihikisaki = document.getElementById('search-torihikisaki')?.value.toLowerCase().trim() || '';
      const searchTorihikisakiName = document.getElementById('search-torihikisaki-name')?.value.toLowerCase().trim() || '';
      const searchShukka = document.getElementById('search-shukka')?.value.toLowerCase().trim() || '';
      const searchNyuko = document.getElementById('search-nyuko')?.value.toLowerCase().trim() || '';
      const searchShohinName = document.getElementById('search-shohin-name')?.value.toLowerCase().trim() || '';
      const searchShohinNo = document.getElementById('search-shohin-no')?.value.toLowerCase().trim() || '';
      const searchSku = document.getElementById('search-sku')?.value.toLowerCase().trim() || '';
      const searchNimotsu = document.getElementById('search-nimotsu')?.value.toLowerCase().trim() || '';
      const searchStatus = document.getElementById('search-status')?.value.toLowerCase().trim() || '';
      
      // すべての検索条件が空の場合は全データを表示
      if (!searchTorihikisaki && !searchTorihikisakiName && !searchShukka && !searchNyuko && !searchShohinName && 
          !searchShohinNo && !searchSku && !searchNimotsu && !searchStatus) {
        displayRegisteredData();
        return;
      }
      
      // 各カラムごとに絞り込み
      const filteredData = registeredData.filter(data => {
        const matchTorihikisaki = !searchTorihikisaki || String(data.取引先コード).toLowerCase().includes(searchTorihikisaki);
        const matchTorihikisakiName = !searchTorihikisakiName || String(data.取引先名 || '').toLowerCase().includes(searchTorihikisakiName);
        const matchShukka = !searchShukka || String(data.発送元出荷日).toLowerCase().includes(searchShukka);
        const matchNyuko = !searchNyuko || String(data.入庫予定日).toLowerCase().includes(searchNyuko);
        const matchShohinName = !searchShohinName || String(data.商品名).toLowerCase().includes(searchShohinName);
        const matchShohinNo = !searchShohinNo || String(data.商品番号).toLowerCase().includes(searchShohinNo);
        const matchSku = !searchSku || String(data.SKU).toLowerCase().includes(searchSku);
        const matchNimotsu = !searchNimotsu || String(data.荷物番号).toLowerCase().includes(searchNimotsu);
        const matchStatus = !searchStatus || String(data.在庫ステータス).toLowerCase().includes(searchStatus);
        
        // すべての条件に一致する場合のみ表示（AND検索）
        return matchTorihikisaki && matchTorihikisakiName && matchShukka && matchNyuko && matchShohinName && 
               matchShohinNo && matchSku && matchNimotsu && matchStatus;
      });
      
      displayRegisteredData(filteredData);
    }

    // 一括編集を保存
    function saveBulkEdit(indices) {
      const updates = {
        取引先コード: document.getElementById('bulk-edit-torihikisaki').value.trim(),
        発送元出荷日: document.getElementById('bulk-edit-shukka').value.trim(),
        入庫予定日: document.getElementById('bulk-edit-nyuko').value.trim(),
        商品名: document.getElementById('bulk-edit-shohin-name').value.trim(),
        商品番号: document.getElementById('bulk-edit-shohin-no').value.trim(),
        SKU: document.getElementById('bulk-edit-sku').value.trim(),
        個数: document.getElementById('bulk-edit-kosu').value.trim(),
        オプション1: document.getElementById('bulk-edit-option1').value.trim(),
        オプション2: document.getElementById('bulk-edit-option2').value.trim(),
        オプション3: document.getElementById('bulk-edit-option3').value.trim(),
        オプション4: document.getElementById('bulk-edit-option4').value.trim(),
        オプション5: document.getElementById('bulk-edit-option5').value.trim(),
        荷物番号: document.getElementById('bulk-edit-nimotsu').value.trim(),
        在庫ステータス: document.getElementById('bulk-edit-status').value
      };
      
      // 空でない項目のみを更新
      indices.forEach(index => {
        Object.keys(updates).forEach(key => {
          if (updates[key] !== '') {
            registeredData[index][key] = updates[key];
          }
        });
      });
      
      closeEditDialog();
      displayRegisteredData();
      
      // チェックボックスをクリア
      document.getElementById('select-all-jokyo').checked = false;
      updateBulkEditButton();
      
      showNotification(`${indices.length}件のデータを一括更新しました`, 'success');
    }

    // バーコード入力処理

    // バーコード処理
    function processBarcode(barcode) {
      const kenpinTime = new Date().toLocaleString('ja-JP');
      
      // 入荷予定データから該当するデータを検索
      // バーコードは商品番号、SKU、荷物番号のいずれかと一致するものとする
      const matchedData = registeredData.find(data => 
        data.商品番号 === barcode || 
        data.SKU === barcode || 
        data.荷物番号 === barcode
      );
      
      if (matchedData) {
        // 検品数をチェック
        const kenpinCount = kenpinData.filter(k => 
          k.SKU === matchedData.SKU && 
          k.荷物番号 === matchedData.荷物番号 && 
          k.ステータス === '検品OK'
        ).length;
        
        const yoteiCount = parseInt(matchedData.個数) || 0;
        
        if (kenpinCount >= yoteiCount) {
          // 過検品
          addKenpinHistory({
            検品時刻: kenpinTime,
            バーコード: barcode,
            商品名: matchedData.商品名,
            SKU: matchedData.SKU,
            荷物番号: matchedData.荷物番号,
            個数: matchedData.個数,
            取引先コード: matchedData.取引先コード,
            ステータス: '過検品エラー'
          });
          playSound('error');
          showNotification('過検品エラー: 予定数を超えています', 'error');
          
          // 入力欄をクリア
          clearBarcodeInput();
          
          // 表示を更新
          displayYoteiList();
          updateKenpinStats();
        } else {
          // 正常検品 - 棚番号入力モーダルを表示
          showTanaBangoModal(matchedData, barcode, kenpinTime, kenpinCount, yoteiCount);
        }
      } else {
        // データ不一致
        addKenpinHistory({
          検品時刻: kenpinTime,
          バーコード: barcode,
          商品名: '-',
          SKU: '-',
          荷物番号: '-',
          個数: '-',
          ステータス: 'データ不一致'
        });
        playSound('error');
        showNotification('エラー: 該当する入荷予定データが見つかりません', 'error');
        
        // 入力欄をクリア
        clearBarcodeInput();
        
        // 表示を更新
        displayYoteiList();
        updateKenpinStats();
      }
    }

    function confirmTanaBangoInput() {
      const tanaBango = document.getElementById('tana-bango-input').value.trim();
      
      if (!tanaBango) {
        alert('棚番号を入力してください');
        return;
      }
      
      const modal = document.getElementById('tana-bango-modal');
      const matchedData = JSON.parse(modal.dataset.matchedData);
      const barcode = modal.dataset.barcode;
      const kenpinTime = modal.dataset.kenpinTime;
      const kenpinCount = parseInt(modal.dataset.kenpinCount);
      const yoteiCount = parseInt(modal.dataset.yoteiCount);
      
      // 検品履歴に追加
      addKenpinHistory({
        検品時刻: kenpinTime,
        バーコード: barcode,
        商品名: matchedData.商品名,
        SKU: matchedData.SKU,
        荷物番号: matchedData.荷物番号,
        個数: matchedData.個数,
        ステータス: '検品OK',
        取引先コード: matchedData.取引先コード,
        商品番号: matchedData.商品番号,
        棚番号: tanaBango
      });
      
      // 入荷予定データに棚番号を保存
      const dataIndex = registeredData.findIndex(d => 
        d.SKU === matchedData.SKU && d.荷物番号 === matchedData.荷物番号
      );
      
      if (dataIndex !== -1) {
        registeredData[dataIndex].棚番号 = tanaBango;
        
        const newKenpinCount = kenpinCount + 1;
        if (newKenpinCount >= yoteiCount) {
          registeredData[dataIndex].在庫ステータス = '入荷済み';
        }
      }
      
      playSound('success');
      showNotification('検品OK: ' + matchedData.商品名 + ' (棚番号: ' + tanaBango + ')', 'success');

      displayYoteiList();
      updateKenpinStats();

      const yoteiCountElement = document.getElementById('yotei-count');
      const kenpinCountElement = document.getElementById('kenpin-count');
      const mikenpinCountElement = document.getElementById('mikenpin-count');
      const errorCountElement = document.getElementById('error-count');
      
      if (!yoteiCountElement) return;
      
      // 予定数の合計
      const totalYotei = registeredData.reduce((sum, data) => sum + (parseInt(data.個数) || 0), 0);
      
      // 検品OK数
      const totalKenpin = kenpinData.filter(k => k.ステータス === '検品OK').length;
      
      // 未検品数
      const totalMikenpin = totalYotei - totalKenpin;
      
      // エラー数

      yoteiCountElement.textContent = totalYotei;
      kenpinCountElement.textContent = totalKenpin;

      errorCountElement.textContent = totalError;

    // 検品履歴CSVエクスポート
    function exportKenpinCSV() {
      if (kenpinData.length === 0) {
        alert('エクスポートするデータがありません');
        return;
      }
      
      let csv = '検品時刻,取引先コード,バーコード,商品名,SKU,荷物番号,個数,ステータス\n';
      
      kenpinData.forEach(data => {
        csv += `${data.検品時刻},${data.取引先コード || ''},${data.バーコード},${data.商品名},${data.SKU},${data.荷物番号},${data.個数 || ''},${data.ステータス}\n`;
      });
      
      // BOMを追加してExcelで文字化けを防ぐ
      const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
      const blob = new Blob([bom, csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      
      link.setAttribute('href', url);
      link.setAttribute('download', '入荷検品履歴_' + new Date().toISOString().slice(0, 10) + '.csv');
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

        // 特定の荷物番号の引当数を取得
        const key = `${sku}_${nimotsuBango}`;
        return hikiateInfo.get(key) || 0;

        shukkaYoteiData.forEach(yotei => {

            hikiateSu += parseInt(yotei.個数) || 0;
          }
        });
        return hikiateSu;
      }
    }

    // 詳細検索モーダルを閉じる
    function closeDetailedSearchModal() {
      const modal = document.getElementById('detailed-search-modal');
      if (modal) {
        modal.remove();
      }
    }
    
    // 詳細検索を実行
    function executeDetailedSearch() {
      const searchShukkaStart = document.getElementById('detailed-search-shukka-start')?.value || '';
      const searchShukkaEnd = document.getElementById('detailed-search-shukka-end')?.value || '';
      const searchStatus = document.getElementById('detailed-search-status')?.value || '';
      const searchHyouka = document.getElementById('detailed-search-hyouka')?.value || '';
      const searchBikou = document.getElementById('detailed-search-bikou')?.value.toLowerCase().trim() || '';
      
      // すべての検索条件が空の場合は全データを表示
      if (!searchShukkaStart && !searchShukkaEnd && !searchStatus && !searchHyouka && !searchBikou) {
        displayZaikoData();
        closeDetailedSearchModal();
        return;
      }
      
      // 検品OKデータから在庫データを生成
      const kenpinOkData = kenpinData.filter(k => k.ステータス === '検品OK');
      
      // フィルタリング用のユニークなアイテムを抽出
      const uniqueItems = [];
      const seenKeys = new Set();
      
      kenpinOkData.forEach(kenpin => {
        const key = `${kenpin.SKU}_${kenpin.荷物番号}`;
        if (!seenKeys.has(key)) {
          seenKeys.add(key);
          const registeredItem = registeredData.find(d => 
            d.SKU === kenpin.SKU && d.荷物番号 === kenpin.荷物番号
          );
          
          if (registeredItem) {
            uniqueItems.push({
              出荷日: registeredItem.発送元出荷日,
              在庫ステータス: registeredItem.在庫ステータス || '販売待',
              商品評価: registeredItem.商品評価 || '',
              備考: registeredItem.備考 || '',
              商品管理番号: kenpin.SKU,
              SKU: kenpin.SKU,
              商品名: kenpin.商品名,
              商品番号: registeredItem.商品番号,
              棚番号: registeredItem.棚番号,
              入荷日: registeredItem.入庫予定日 || registeredItem.入荷日
            });
          }
        }
      });
      
      // 各カラムごとに絞り込み
      const filteredData = uniqueItems.filter(data => {
        // 出荷日の範囲検索
        let matchShukka = true;
        if (searchShukkaStart || searchShukkaEnd) {
          const shukkaDate = data.出荷日 ? new Date(data.出荷日) : null;
          const startDate = searchShukkaStart ? new Date(searchShukkaStart) : null;
          const endDate = searchShukkaEnd ? new Date(searchShukkaEnd) : null;
          
          if (shukkaDate) {
            if (startDate && shukkaDate < startDate) matchShukka = false;
            if (endDate && shukkaDate > endDate) matchShukka = false;
          } else {
            matchShukka = !searchShukkaStart && !searchShukkaEnd;
          }
        }
        
        const matchStatus = !searchStatus || data.在庫ステータス === searchStatus;
        const matchHyouka = !searchHyouka || data.商品評価 === searchHyouka;
        const matchBikou = !searchBikou || String(data.備考).toLowerCase().includes(searchBikou);
        
        // すべての条件に一致する場合のみ表示（AND検索）
        return matchShukka && matchStatus && matchHyouka && matchBikou;
      });
      
      displayZaikoData(filteredData);
      closeDetailedSearchModal();
    }
    
    // グローバル変数: 現在のソート設定
    let currentSort = {
      column: null,
      direction: 'asc' // 'asc' または 'desc'
    };
    
    // 在庫データのソート機能
    function sortZaikoData(columnName) {
      const thead = document.querySelector('thead tr');
      const allArrowsUp = thead.querySelectorAll('.sort-arrow-up');
      const allArrowsDown = thead.querySelectorAll('.sort-arrow-down');
      
      // 全ての矢印のハイライトを削除
      allArrowsUp.forEach(arrow => {
        arrow.classList.remove('text-yellow-300');
        arrow.classList.add('text-gray-400');
      });
      allArrowsDown.forEach(arrow => {
        arrow.classList.remove('text-yellow-300');
        arrow.classList.add('text-gray-400');
      });
      
      // 同じカラムをクリックした場合は方向を切り替え、異なるカラムの場合は昇順に設定
      if (currentSort.column === columnName) {
        currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
      } else {
        currentSort.column = columnName;
        currentSort.direction = 'asc';
      }
      
      // クリックされたカラムの矢印をハイライト
      const clickedArrow = currentSort.direction === 'asc'
        ? thead.querySelector(`.sort-arrow-up[data-column="${columnName}"]`)
        : thead.querySelector(`.sort-arrow-down[data-column="${columnName}"]`);
      
      if (clickedArrow) {
        clickedArrow.classList.remove('text-gray-400');
        clickedArrow.classList.add('text-yellow-300');
      }
      
      // zaikoDataArrayをソート
      const sortedData = [...zaikoDataArray];
      
      sortedData.sort((a, b) => {
        let aVal = a[columnName] || '';
        let bVal = b[columnName] || '';
        
        // 数値の場合は数値として比較
        if (!isNaN(aVal) && !isNaN(bVal) && aVal !== '' && bVal !== '') {
          aVal = parseFloat(aVal);
          bVal = parseFloat(bVal);
        } else {
          // 文字列の場合は文字列として比較
          aVal = String(aVal).toLowerCase();
          bVal = String(bVal).toLowerCase();
        }
        
        if (currentSort.direction === 'asc') {
          return aVal > bVal ? 1 : aVal < bVal ? -1 : 0;
        } else {
          return aVal < bVal ? 1 : aVal > bVal ? -1 : 0;
        }
      });
      
      // ソート済みデータを表示
      displayZaikoDataFromArray(sortedData);
    }

    // 在庫一覧の件数表示を更新
    function updateZaikoRowCount(count) {
      const totalCountElement = document.getElementById('zaiko-total-count');
      const displayRangeElement = document.getElementById('zaiko-display-range');
      
      if (totalCountElement && displayRangeElement) {
        totalCountElement.textContent = count;

    // 在庫検索機能
    function searchZaiko() {
      const searchShohinKanri = document.getElementById('zaiko-search-shohin-kanri')?.value.toLowerCase().trim() || '';
      const searchSku = document.getElementById('zaiko-search-sku')?.value.toLowerCase().trim() || '';
      const searchShohinName = document.getElementById('zaiko-search-shohin-name')?.value.toLowerCase().trim() || '';
      const searchShohinBango = document.getElementById('zaiko-search-shohin-bango')?.value.toLowerCase().trim() || '';
      const searchTanaBango = document.getElementById('zaiko-search-tana-bango')?.value.toLowerCase().trim() || '';
      const searchNyukaStart = document.getElementById('zaiko-search-nyuka-start')?.value || '';
      const searchNyukaEnd = document.getElementById('zaiko-search-nyuka-end')?.value || '';
      
      // すべての検索条件が空の場合は全データを表示
      if (!searchShohinKanri && !searchSku && !searchShohinName && !searchShohinBango && !searchTanaBango && !searchNyukaStart && !searchNyukaEnd) {
        displayZaikoData();
        return;
      }
      
      // 検品OKデータから在庫データを生成
      const kenpinOkData = kenpinData.filter(k => k.ステータス === '検品OK');
      
      // フィルタリング用のユニークなアイテムを抽出
      const uniqueItems = [];
      const seenKeys = new Set();
      
      kenpinOkData.forEach(kenpin => {
        const key = `${kenpin.SKU}_${kenpin.荷物番号}`;
        if (!seenKeys.has(key)) {
          seenKeys.add(key);
          const registeredItem = registeredData.find(d => 
            d.SKU === kenpin.SKU && d.荷物番号 === kenpin.荷物番号
          );
          
          if (registeredItem) {
            uniqueItems.push({
              商品管理番号: kenpin.SKU, // SKUを商品管理番号として使用
              SKU: kenpin.SKU,
              商品名: kenpin.商品名,
              商品番号: registeredItem.商品番号,
              棚番号: registeredItem.棚番号,
              入荷日: registeredItem.入庫予定日
            });
          }
        }
      });
      
      // 各カラムごとに絞り込み
      const filteredData = uniqueItems.filter(data => {
        const matchShohinKanri = !searchShohinKanri || String(data.商品管理番号).toLowerCase().includes(searchShohinKanri);
        const matchSku = !searchSku || String(data.SKU).toLowerCase().includes(searchSku);
        const matchShohinName = !searchShohinName || String(data.商品名).toLowerCase().includes(searchShohinName);
        const matchShohinBango = !searchShohinBango || String(data.商品番号).toLowerCase().includes(searchShohinBango);
        const matchTanaBango = !searchTanaBango || String(data.棚番号).toLowerCase().includes(searchTanaBango);
        const matchNyukaDate = (!searchNyukaStart || data.入荷日 >= searchNyukaStart) && (!searchNyukaEnd || data.入荷日 <= searchNyukaEnd);
        
        // すべての条件に一致する場合のみ表示（AND検索）
        return matchShohinKanri && matchSku && matchShohinName && matchShohinBango && matchTanaBango && matchNyukaDate;
      });
      
      displayZaikoData(filteredData);
    }

    // 在庫データを保存
    function saveZaikoData(index) {
      const data = zaikoDataArray[index];
      const originalSku = data.SKU;
      const originalNimotsu = data.荷物番号;
      
      // 更新されたデータを取得
      const updatedData = {
        取引先コード: document.getElementById('edit-zaiko-torihikisaki').value,
        商品名: document.getElementById('edit-zaiko-shohin-name').value,
        商品番号: document.getElementById('edit-zaiko-shohin-no').value,
        SKU: document.getElementById('edit-zaiko-sku').value,
        在庫数: parseInt(document.getElementById('edit-zaiko-su').value),
        荷物番号: document.getElementById('edit-zaiko-nimotsu').value,
        棚番号: document.getElementById('edit-zaiko-tana').value || '-',
        定価: document.getElementById('edit-zaiko-teika').value,
        在庫ステータス: document.getElementById('edit-zaiko-status').value,
        入荷拠点: document.getElementById('edit-zaiko-nyukakyo').value,
        備考: document.getElementById('edit-zaiko-bikou').value
      };
      
      // kenpinDataとregisteredDataを更新
      kenpinData.forEach(kenpin => {
        if (kenpin.SKU === originalSku && kenpin.荷物番号 === originalNimotsu) {
          kenpin.取引先コード = updatedData.取引先コード;
          kenpin.商品名 = updatedData.商品名;
          kenpin.商品番号 = updatedData.商品番号;
          kenpin.SKU = updatedData.SKU;
          kenpin.荷物番号 = updatedData.荷物番号;
          kenpin.棚番号 = updatedData.棚番号;
        }
      });
      
      registeredData.forEach(reg => {
        if (reg.SKU === originalSku && reg.荷物番号 === originalNimotsu) {
          reg.取引先コード = updatedData.取引先コード;
          reg.商品名 = updatedData.商品名;
          reg.商品番号 = updatedData.商品番号;
          reg.SKU = updatedData.SKU;
          reg.荷物番号 = updatedData.荷物番号;
          reg.棚番号 = updatedData.棚番号;
          reg.定価 = updatedData.定価;
          reg.在庫ステータス = updatedData.在庫ステータス;
          reg.入荷拠点 = updatedData.入荷拠点;
          reg.備考 = updatedData.備考;
        }
      });
      
      closeEditDialog();
      displayZaikoData();
      showNotification('在庫データを更新しました', 'success');

    // 在庫データを削除
    function deleteZaikoData(index) {
      if (confirm('この在庫データを削除してもよろしいですか？')) {
        const data = zaikoDataArray[index];
        const originalSku = data.SKU;
        const originalNimotsu = data.荷物番号;
        
        // kenpinDataから削除
        const kenpinIndex = kenpinData.findIndex(kenpin => 
          kenpin.SKU === originalSku && kenpin.荷物番号 === originalNimotsu
        );
        if (kenpinIndex !== -1) {
          kenpinData.splice(kenpinIndex, 1);
        }
        
        // registeredDataから削除
        const registeredIndex = registeredData.findIndex(reg => 
          reg.SKU === originalSku && reg.荷物番号 === originalNimotsu
        );
        if (registeredIndex !== -1) {
          registeredData.splice(registeredIndex, 1);
        }
        
        // TRデータインポートで追加されたデータから削除
        if (window.importedTRData && window.importedTRData.length > 0) {
          const importedIndex = window.importedTRData.findIndex(item =>
            item.SKU === originalSku && (item.荷物番号 === originalNimotsu || !item.荷物番号)
          );
          if (importedIndex !== -1) {
            window.importedTRData.splice(importedIndex, 1);
          }
        }
        
        closeEditDialog();
        displayZaikoData();
        showNotification('在庫データを削除しました', 'success');
      }
    }

    // 在庫データの一括編集を保存
    function saveBulkEditZaiko(indices) {
      const updates = {
        商品名: document.getElementById('bulk-edit-zaiko-shohinmei').value.trim(),
        棚番号: document.getElementById('bulk-edit-zaiko-tana').value.trim(),
        在庫ステータス: document.getElementById('bulk-edit-zaiko-status').value,
        備考: document.getElementById('bulk-edit-zaiko-biko').value.trim()
      };
      
      // 各選択データに対して更新を適用（表示されている値をそのまま保存）
      indices.forEach(index => {
        const data = zaikoDataArray[index];
        const originalSku = data.SKU;
        const originalNimotsu = data.荷物番号;
        
        // kenpinDataを更新
        kenpinData.forEach(kenpin => {
          if (kenpin.SKU === originalSku && kenpin.荷物番号 === originalNimotsu) {
            kenpin.商品名 = updates.商品名;
            kenpin.棚番号 = updates.棚番号;
          }
        });
        
        // registeredDataを更新（複数マッチの可能性を考慮）
        const matchedRegisteredData = registeredData.filter(reg => 
          reg.SKU === originalSku && reg.荷物番号 === originalNimotsu
        );
        
        matchedRegisteredData.forEach(reg => {
          reg.商品名 = updates.商品名;
          reg.棚番号 = updates.棚番号;
          reg.在庫ステータス = updates.在庫ステータス;
          reg.備考 = updates.備考;
        });
        
        // TRDataも更新対象にする
        if (window.importedTRData) {
          window.importedTRData.forEach(trData => {
            if (trData.SKU === originalSku && trData.荷物番号 === originalNimotsu) {
              trData.商品名 = updates.商品名;
              trData.棚番号 = updates.棚番号;
              trData.在庫ステータス = updates.在庫ステータス;
              trData.備考 = updates.備考;
            }
          });
        }
      });
      
      closeEditDialog();
      
      // zaikoMapをクリアして強制的に再構築させる
      zaikoMap.clear();
      
      displayZaikoData();
      
      // チェックボックスをクリア
      document.getElementById('select-all-zaiko').checked = false;
      updateBulkEditZaikoButton();
      
      showNotification(`${indices.length}件の在庫データを一括更新しました`, 'success');
    }
    
    // 在庫CSVエクスポート機能
    function exportZaikoCSV() {
      // 検品OKデータから在庫データを生成
      const kenpinOkData = kenpinData.filter(k => k.ステータス === '検品OK');
      
      if (kenpinOkData.length === 0) {
        alert('エクスポートするデータがありません');
        return;
      }
      
      // SKUと荷物番号の組み合わせでグループ化
      const zaikoMap = new Map();
      
      kenpinOkData.forEach(kenpin => {
        const key = `${kenpin.SKU}_${kenpin.荷物番号}`;
        if (!zaikoMap.has(key)) {
          const registeredItem = registeredData.find(d => 
            d.SKU === kenpin.SKU && d.荷物番号 === kenpin.荷物番号
          );
          
          if (registeredItem) {
            zaikoMap.set(key, {
              取引先コード: kenpin.取引先コード || registeredItem.取引先コード,
              商品名: kenpin.商品名,
              商品番号: kenpin.商品番号 || registeredItem.商品番号,
              SKU: kenpin.SKU,
              荷物番号: kenpin.荷物番号,
              棚番号: kenpin.棚番号 || registeredItem.棚番号 || '',
              登録日時: registeredItem.登録日時,
              在庫数: 1
            });
          }
        } else {
          const item = zaikoMap.get(key);
          item.在庫数++;
          // 棚番号が未設定で新しいkenpinに棚番号がある場合は更新
          if (!item.棚番号 && kenpin.棚番号) {
            item.棚番号 = kenpin.棚番号;
          }
        }
      });
      
      let csv = '取引先コード,商品名,商品番号,SKU,在庫数,荷物番号,棚番号,入荷日\n';
      
      zaikoMap.forEach(data => {
        csv += `${data.取引先コード},${data.商品名},${data.商品番号},${data.SKU},${data.在庫数},${data.荷物番号},${data.棚番号},${data.登録日時}\n`;
      });
      
      // BOMを追加してExcelで文字化けを防ぐ
      const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
      const blob = new Blob([bom, csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      
      link.setAttribute('href', url);
      link.setAttribute('download', '在庫一覧_' + new Date().toISOString().slice(0, 10) + '.csv');
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function searchTRZaiko() {
      const torihikisaki = document.getElementById('tr-search-torihikisaki').value.toLowerCase().trim();

      const sku = document.getElementById('tr-search-sku').value.toLowerCase().trim();

        const registeredItem = registeredData.find(d => 
          d.SKU === k.SKU && d.荷物番号 === k.荷物番号
        );
        
        const matchTorihikisaki = !torihikisaki || (registeredItem?.取引先コード && registeredItem.取引先コード.toLowerCase().includes(torihikisaki));
        const matchShohin = !shohin || (k.商品名 && k.商品名.toLowerCase().includes(shohin));
        const matchSku = !sku || (k.SKU && k.SKU.toLowerCase().includes(sku));
        const matchTana = !tana || (k.棚番号 && k.棚番号.toLowerCase().includes(tana));
        
        return matchTorihikisaki && matchShohin && matchSku && matchTana;
      });
      
      displayTRZaikoData(filtered);
    }

    // TRデータをインポート
    function importTRData() {
      const fileInput = document.getElementById('tr-csv-file');
      
      if (!fileInput.files || fileInput.files.length === 0) {
        alert('CSVファイルを選択してください');
        return;
      }
      
      const file = fileInput.files[0];
      const reader = new FileReader();
      
      reader.onload = function(e) {
        try {
          const csv = e.target.result;
          const lines = csv.split('\n').filter(line => line.trim());
          
          console.log('Total lines:', lines.length);
          console.log('First line (header):', lines[0]);
          
          if (lines.length < 2) {
            alert('CSVファイルにデータが含まれていません');
            return;
          }
          
          // ヘッダー行をスキップ
          const dataLines = lines.slice(1);
          let importCount = 0;
          
          // 在庫ステータスを「販売待ち」（仮棚データ）に固定
          const fixedZaikoStatus = '販売待ち';
          const now = new Date().toISOString().slice(0, 19).replace('T', ' ');
          
          // 一時保存用配列
          const importedItems = [];
          
          dataLines.forEach((line, idx) => {
            console.log('Processing line', idx + 1, ':', line);
            // カンマで分割（空の値も保持）
            const values = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {

              if (char === '"') {
                inQuotes = !inQuotes;
              } else if (char === ',' && !inQuotes) {
                values.push(current.trim());
                current = '';
              } else {

              }
            }
            values.push(current.trim());
            
            console.log('Parsed values:', values, 'Length:', values.length);
            
            // 17列に満たない場合は空文字列で埋める

    // 「販売待ち」「販売待」などの表記ゆれを許容
    function isHanbaiMachiStatus(status) {
      const normalized = String(status || '').trim();
      return normalized === '販売待ち' || normalized === '販売待';
    }
    
    // CSVの1行をパース（カンマ区切り、ダブルクォート対応）
    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];
        
        if (char === '"') {
          if (inQuotes && nextChar === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          result.push(current.trim());
          current = '';
        } else {
          current += char;
        }
      }
      
      result.push(current.trim());
      return result;
    }
    
    // 次の管理番号を取得
    function getNextKanriNo() {
      if (zaikoDataArray.length === 0) {
        return 1;
      }
      
      const maxNo = Math.max(...zaikoDataArray.map(item => {
        const no = parseInt(item.管理番号.replace(/[^0-9]/g, ''));
        return isNaN(no) ? 0 : no;
      }));
      
      return maxNo + 1;
    }
    
    // 在庫番号を生成
    function generateZaikoNumber() {
      const maxNo = Math.max(0, ...registeredData.map(item => {
        const no = parseInt(item.番号) || 0;
        return no;
      }));
      
      return maxNo + 1;
    }

    // CSVから在庫データをインポート
    function importZaikoFromCsv() {
      const csvFile = document.getElementById('zaiko-csv-file');
      if (!csvFile || csvFile.files.length === 0) {
        alert('CSVファイルを選択してください');
        return;
      }
      
      const reader = new FileReader();
      reader.onload = function(e) {
        const csv = e.target.result;
        const lines = csv.trim().split('\n');
        
        if (lines.length < 2) {
          alert('CSVファイルにデータがありません');
          return;
        }
        
        let importCount = 0;
        const errors = [];
        const now = new Date().toLocaleString('ja-JP');
        
        // データ行をループ（ヘッダーをスキップ）
        for (let i = 1; i < lines.length; i++) {
          const cells = lines[i].split(',');
          
          if (cells.length < 7) {
            errors.push(`${i + 1}行目: 必須カラムが不足しています`);
            continue;
          }
          
          const kosu = parseInt(cells[4]?.trim()) || 0;
          const torihikisaki = cells[0]?.trim() || '';
          const shohinName = cells[1]?.trim() || '';
          const shohinNo = cells[2]?.trim() || '';
          const sku = cells[3]?.trim() || '';
          const tanaNo = cells[5]?.trim() || '';
          const nimotsuNo = cells[6]?.trim() || '';
          
          // 必須項目の確認
          if (!torihikisaki || !shohinName || !sku || kosu < 1 || !nimotsuNo) {
            errors.push(`${i + 1}行目: 必須項目が不足しています`);
            continue;
          }
          
          // 商品管理番号をキーに既存データをチェック
          const existingRegisteredIndex = registeredData.findIndex(
            item => item.商品管理番号 === shohinNo || 
                    (item.SKU === sku && item.荷物番号 === nimotsuNo)
          );
          
          const registeredItem = {
            番号: existingRegisteredIndex >= 0 ? registeredData[existingRegisteredIndex].番号 : generateZaikoNumber(),
            商品管理番号: shohinNo,
            取引先コード: torihikisaki,
            商品名: shohinName,
            商品番号: shohinNo,
            SKU: sku,
            在庫数: kosu,
            棚番号: tanaNo,
            荷物番号: nimotsuNo,
            発送元出荷日: cells[7]?.trim() || '',
            入庫予定日: cells[8]?.trim() || '',
            オプション1: cells[9]?.trim() || '',
            オプション2: cells[10]?.trim() || '',
            オプション3: cells[11]?.trim() || '',
            オプション4: cells[12]?.trim() || '',
            オプション5: cells[13]?.trim() || '',
            登録日時: now
          };
          
          if (existingRegisteredIndex >= 0) {
            // 既存データを更新
            registeredData[existingRegisteredIndex] = registeredItem;
          } else {
            // 新規追加
            registeredData.push(registeredItem);
          }
          
          // kenpinDataから既存のデータを削除
          kenpinData = kenpinData.filter(
            item => !(item.SKU === sku && item.荷物番号 === nimotsuNo)
          );
          
          // kenpinDataに追加（指定された在庫数分、検品OK状態で）
          for (let j = 0; j < kosu; j++) {
            const kenpinItem = {
              検品時刻: now,
              取引先コード: torihikisaki,
              バーコード: sku,
              商品名: shohinName,
              SKU: sku,
              荷物番号: nimotsuNo,
              個数: 1,
              ステータス: '検品OK',
              棚番号: tanaNo
            };
            
            kenpinData.push(kenpinItem);
          }
          
          importCount++;
        }
        
        if (importCount > 0) {
          displayZaikoData();
          closeEditDialog();
          showNotification(`${importCount}件の在庫データをインポートしました`, 'success');
        }
        
        if (errors.length > 0) {
          const errorMsg = errors.slice(0, 5).join('\n') + (errors.length > 5 ? `\n他 ${errors.length - 5}件のエラー` : '');
          showNotification(`${errorMsg}`, 'error');
        }
      };
      
      // ファイルオブジェクトを読み込む
      reader.readAsText(csvFile.files[0]);
    }
    
    // TRデータCSVから在庫データをインポート
    function importTRDataFromCsv() {
      const csvFile = document.getElementById('zaiko-tr-csv-file');
      if (!csvFile || csvFile.files.length === 0) {
        alert('TRデータCSVファイルを選択してください');
        return;
      }
      
      const reader = new FileReader();
      reader.onload = function(e) {
        const csv = e.target.result;
        const lines = csv.trim().split('\n');
        
        if (lines.length < 2) {
          alert('CSVファイルにデータがありません');
          return;
        }
        
        let importCount = 0;
        const errors = [];
        const now = new Date().toLocaleString('ja-JP');
        
        // window.importedTRDataが未初期化の場合は初期化
        if (!window.importedTRData) {
          window.importedTRData = [];
        }
        
        // データ行をループ（ヘッダーをスキップ）
        for (let i = 1; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue; // 空行をスキップ
          
          const cells = line.split(',');
          
          // 新フォーマット: 管理番号, 商品名, 商品番号, SKU, カラー, サイズ, オプション, 商品評価, 仕切価格, 在庫数, 棚番号, 入荷日, 在庫ステータス
          if (cells.length < 13) {
            errors.push(`${i + 1}行目: 必須カラムが不足しています (${cells.length}カラム)`);
            continue;
          }
          
          const kanriNo = (cells[0] || '').trim();

          const tanaNo = (cells[10] || '').trim();
          const nyukaDate = (cells[11] || '').trim();
          const zaikoStatus = (cells[12] || '販売待').trim();

            errors.push(`${i + 1}行目: 必須項目が不足しています（管理番号:${kanriNo}, 商品名:${shohinName}, SKU:${sku}）`);
            continue;
          }

            item => item.管理番号 === kanriNo
          );

            SKU: sku,
            カラー: color,
            サイズ: size,
            オプション: option,
            商品評価: shohinHyoka,
            仕切価格: shikiriKakaku,
            在庫数: zaikoSu,
            棚番号: tanaNo,
            入荷日: nyukaDate,
            在庫ステータス: zaikoStatus,
            取引先コード: '',
            荷物番号: ''
          };
          
          if (existingTRIndex >= 0) {
            // 既存データを更新
            window.importedTRData[existingTRIndex] = trItem;
          } else {
            // 新規追加
            window.importedTRData.push(trItem);
          }
          
          importCount++;
        }
        
        if (importCount > 0) {
          displayZaikoData();
          closeEditDialog();
          showNotification(`${importCount}件のTRデータをインポートしました`, 'success');
        }
        
        if (errors.length > 0) {
          const errorMsg = errors.slice(0, 5).join('\n') + (errors.length > 5 ? `\n他 ${errors.length - 5}件のエラー` : '');
          showNotification(`${errorMsg}`, 'error');
        }
      };
      
      // ファイルオブジェクトを読み込む

    }

    // STEP1: 現在の棚番号入力処理
    function handleCurrentTanaInput(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        const currentTana = document.getElementById('current-tana-input').value.trim();
        
        if (!currentTana) {
          alert('棚番号を入力してください');
          return;
        }
        
        // 該当する棚番号の在庫を検索（棚振り済みでないもののみ）
        const matchedItems = kenpinData.filter(k => {
          if (k.ステータス !== '検品OK') return false;
          if (k.棚振り済み) return false; // 棚振り済みは除外
          
          const registeredItem = registeredData.find(d => 
            d.SKU === k.SKU && d.荷物番号 === k.荷物番号
          );
          
          return k.棚番号 === currentTana || registeredItem?.棚番号 === currentTana;
        });
        
        // TRデータインポートで仮棚データをインポートしたデータも検索対象に含める
        let trMatchedItems = [];
        if (window.importedTRData && window.importedTRData.length > 0) {
          trMatchedItems = window.importedTRData.filter(tr => 
            isHanbaiMachiStatus(tr.在庫ステータス) && tr.棚番号 === currentTana && !tr.棚振り済み
          );
        }
        
        if (matchedItems.length === 0 && trMatchedItems.length === 0) {
          showNotification(`エラー: 棚番号「${currentTana}」に在庫が見つかりません`, 'error');
          return;
        }
        
        // 状態を保存
        window.tanafuriState.currentTana = currentTana;
        window.tanafuriState.step = 2;
        
        // プログレスステッパーを更新
        updateStepIndicator(2);
        
        // STEP1を非表示、STEP2を表示
        document.getElementById('step1-area').classList.add('hidden');
        document.getElementById('step2-area').classList.remove('hidden');
        
        // 仮棚内の在庫一覧を表示
        displayTanaInventory(currentTana, matchedItems, trMatchedItems);
        
        showNotification(`棚番号「${currentTana}」を確認しました`, 'success');
        
        // 次の入力欄にフォーカス
        setTimeout(() => {
          document.getElementById('sku-input')?.focus();
        }, 100);
      }
    }
    
    // STEP2: SKU入力処理
    function handleSkuInput(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        const sku = document.getElementById('sku-input').value.trim();
        
        if (!sku) {
          alert('SKUを入力してください');
          return;
        }
        
        // 既にSKUが設定されている場合は、同じSKUかチェック
        if (window.tanafuriState.sku && window.tanafuriState.sku !== sku) {
          showNotification(`エラー: 異なるSKUがスキャンされました。「${window.tanafuriState.sku}」をスキャンしてください`, 'error');
          document.getElementById('sku-input').value = '';
          return;
        }
        
        // 現在の棚番号にある該当SKUの在庫数を計算（棚振り済みでないもののみ）
        const matchedItems = kenpinData.filter(k => {
          if (k.ステータス !== '検品OK' || k.SKU !== sku) return false;
          if (k.棚振り済み) return false; // 棚振り済みは除外
          
          const registeredItem = registeredData.find(d => 
            d.SKU === k.SKU && d.荷物番号 === k.荷物番号
          );
          
          const itemTana = k.棚番号 || registeredItem?.棚番号;
          return itemTana === window.tanafuriState.currentTana;
        });
        
        // TRデータインポートで仮棚データをインポートしたデータも検索対象に含める
        let trMatchedItems = [];
        if (window.importedTRData && window.importedTRData.length > 0) {
          trMatchedItems = window.importedTRData.filter(tr => 
            isHanbaiMachiStatus(tr.在庫ステータス) && 
            tr.SKU === sku && 
            tr.棚番号 === window.tanafuriState.currentTana &&
            !tr.棚振り済み
          );
        }
        
        const totalMatchedItems = matchedItems.length + trMatchedItems.length;
        
        if (totalMatchedItems === 0) {
          showNotification(`エラー: 棚番号「${window.tanafuriState.currentTana}」にSKU「${sku}」が見つかりません`, 'error');
          return;
        }
        
        // 初回スキャン時は状態を初期化
        if (!window.tanafuriState.sku) {
          window.tanafuriState.sku = sku;
          window.tanafuriState.availableQuantity = totalMatchedItems;
          window.tanafuriState.remainingQuantity = totalMatchedItems;
          window.tanafuriState.processedCount = 0;
        }
        
        // 1個ずつ処理
        window.tanafuriState.quantity = 1;
        window.tanafuriState.step = 3;
        
        // プログレスステッパーを更新
        updateStepIndicator(3);
        
        // STEP2を非表示、STEP3を表示
        document.getElementById('step2-area').classList.add('hidden');
        document.getElementById('step3-area').classList.remove('hidden');
        
        // 利用可能個数を表示
        document.getElementById('available-quantity-text').textContent = 
          `※ 在庫総数: ${window.tanafuriState.availableQuantity}個`;
        
        // 残り個数バッジを表示
        const remainingBadge = document.getElementById('remaining-quantity-badge');
        if (remainingBadge) remainingBadge.classList.remove('hidden');
        document.getElementById('remaining-quantity-text').textContent = window.tanafuriState.remainingQuantity;
        
        showNotification(`SKU「${sku}」を確認しました（残り: ${window.tanafuriState.remainingQuantity}個）`, 'success');
        
        // 次の入力欄にフォーカス
        setTimeout(() => {
          document.getElementById('new-tana-input')?.focus();
        }, 100);
      }
    }
    
    // STEP3: 個数入力処理
    function handleQuantityInput(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        const quantity = parseInt(document.getElementById('quantity-input').value);
        
        if (!quantity || quantity < 1) {
          alert('1以上の個数を入力してください');
          return;
        }
        
        if (quantity > window.tanafuriState.availableQuantity) {
          alert(`在庫数を超えています。最大${window.tanafuriState.availableQuantity}個まで入力できます`);
          return;
        }
        
        // 状態を保存
        window.tanafuriState.quantity = quantity;
        window.tanafuriState.step = 4;
        
        // STEP4を表示
        document.getElementById('step3-area').classList.remove('bg-yellow-50');
        document.getElementById('step3-area').classList.add('bg-gray-100');
        document.getElementById('step4-area').classList.remove('hidden', 'bg-gray-100');
        document.getElementById('step4-area').classList.add('bg-purple-50');
        document.getElementById('quantity-input').disabled = true;
        
        showNotification(`移動個数「${quantity}個」を設定しました`, 'success');
        
        // 次の入力欄にフォーカス
        setTimeout(() => {
          document.getElementById('new-tana-input')?.focus();
        }, 100);
      }
    }
    
    // STEP4: 新しい棚番号入力処理
    function handleNewTanaInput(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        const newTana = document.getElementById('new-tana-input').value.trim();
        
        if (!newTana) {
          alert('新しい棚番号を入力してください');
          return;
        }
        
        if (newTana === window.tanafuriState.currentTana) {
          alert('現在の棚番号と同じです。異なる棚番号を入力してください');
          return;
        }
        
        // 状態を保存
        window.tanafuriState.newTana = newTana;
        
        // 棚振りを実行
        executeTanafuri();
      }
    }
    
    // 棚振りを実行
    function executeTanafuri() {
      const { currentTana, sku, quantity, newTana } = window.tanafuriState;
      
      // 該当する検品データを取得（1個だけ）
      const targetItems = kenpinData.filter(k => {
        if (k.ステータス !== '検品OK' || k.SKU !== sku) return false;
        
        const registeredItem = registeredData.find(d => 
          d.SKU === k.SKU && d.荷物番号 === k.荷物番号
        );
        
        const itemTana = k.棚番号 || registeredItem?.棚番号;
        return itemTana === currentTana;
      }).slice(0, 1);
      
      // 棚番号を更新し、在庫ステータスを「販売中」に変更
      targetItems.forEach(item => {
        item.棚番号 = newTana;
        
        // 登録データも更新
        const registeredItem = registeredData.find(d => 
          d.SKU === item.SKU && d.荷物番号 === item.荷物番号
        );
        if (registeredItem) {
          registeredItem.棚番号 = newTana;
          registeredItem.在庫ステータス = '販売中';
        }
      });
      
      // TRデータインポートで仮棚データをインポートしたデータも更新（1個だけ）
      if (targetItems.length === 0 && window.importedTRData && window.importedTRData.length > 0) {
        for (let i = 0; i < window.importedTRData.length; i++) {
          const tr = window.importedTRData[i];
          if (isHanbaiMachiStatus(tr.在庫ステータス) && tr.SKU === sku && tr.棚番号 === currentTana && !tr.棚振り済み) {
            tr.棚番号 = newTana;
            tr.在庫ステータス = '販売中';
            tr.棚振り済み = true;  // 棚振り済みフラグを追加
            break;
          }
        }
      }
      
      // 処理済み個数をカウント
      window.tanafuriState.processedCount++;
      window.tanafuriState.remainingQuantity--;
      
      showNotification(
        `棚振り完了: 1個を「${currentTana}」から「${newTana}」へ移動しました（残り: ${window.tanafuriState.remainingQuantity}個）`,
        'success'
      );
      
      // 仮棚内の在庫一覧を更新
      updateTanaInventoryAfterMove(currentTana);
      
      // 同じSKUの在庫が残っているかチェック(棚振り済みでないものだけ)
      const remainingSKUItems = kenpinData.filter(k => {
        if (k.ステータス !== '検品OK' || k.SKU !== sku) return false;
        if (k.棚振り済み) return false; // 棚振り済みは除外
        
        const registeredItem = registeredData.find(d => 
          d.SKU === k.SKU && d.荷物番号 === k.荷物番号
        );
        
        const itemTana = k.棚番号 || registeredItem?.棚番号;
        return itemTana === currentTana;
      });
      
      // TRデータもチェック
      let remainingSKUTRItems = [];
      if (window.importedTRData && window.importedTRData.length > 0) {
        remainingSKUTRItems = window.importedTRData.filter(tr => 
          isHanbaiMachiStatus(tr.在庫ステータス) && tr.SKU === sku && tr.棚番号 === currentTana && !tr.棚振り済み
        );
      }
      
      const totalRemainingSKU = remainingSKUItems.length + remainingSKUTRItems.length;
      
      // 同じSKUの在庫が残っている場合
      if (totalRemainingSKU > 0) {
        // SKUと新しい棚番号をスキャンするため、STEP2に戻る
        continueWithSameSKU();
      } else {
        // このSKUの移動が完了 - registeredDataを更新
        if (targetItems.length > 0) {
          const registeredItem = registeredData.find(d => 
            d.SKU === sku && d.荷物番号 === targetItems[0].荷物番号
          );
          if (registeredItem) {
            registeredItem.棚番号 = newTana;
            registeredItem.在庫ステータス = '販売中';
          }
        }
        
        showNotification(`SKU「${sku}」の棚振りが完了しました（計${window.tanafuriState.processedCount}個移動）`, 'info');
        
        // 他のSKUの在庫が残っているかチェック
        const remainingOtherItems = kenpinData.filter(k => {
          if (k.ステータス !== '検品OK') return false;
          if (k.棚振り済み) return false; // 棚振り済みは除外
          
          const registeredItem = registeredData.find(d => 
            d.SKU === k.SKU && d.荷物番号 === k.荷物番号
          );
          
          const itemTana = k.棚番号 || registeredItem?.棚番号;
          return itemTana === currentTana;
        });
        
        // TRデータもチェック
        let remainingOtherTRItems = [];
        if (window.importedTRData && window.importedTRData.length > 0) {
          remainingOtherTRItems = window.importedTRData.filter(tr => 
            isHanbaiMachiStatus(tr.在庫ステータス) && tr.棚番号 === currentTana
          );
        }
        
        if (remainingOtherItems.length > 0 || remainingOtherTRItems.length > 0) {
          // 他のSKUの在庫が残っているので、STEP2に戻る（新しいSKU用）
          continueWithSameTana();
        } else {
          // この棚番号の在庫がすべて移動完了
          showNotification(`棚番号「${currentTana}」の在庫がすべて移動されました`, 'info');
          clearTanafuriForm();
        }
      }
    }
    
    // 同じSKUで続行（SKUと本棚番号を再スキャン）
    function continueWithSameSKU() {
      // 入力欄をクリア
      document.getElementById('sku-input').value = '';
      document.getElementById('new-tana-input').value = '';
      
      // STEP3を非表示、STEP2を表示
      document.getElementById('step3-area').classList.add('hidden');
      document.getElementById('step2-area').classList.remove('hidden');
      
      // プログレスステッパーを更新
      updateStepIndicator(2);
      
      // 状態をSTEP2に戻す（SKU情報は保持）
      window.tanafuriState.step = 2;
      window.tanafuriState.quantity = null;
      window.tanafuriState.newTana = null;
      
      // 残り個数バッジを更新
      document.getElementById('remaining-quantity-text').textContent = window.tanafuriState.remainingQuantity;
      
      // SKU入力欄にフォーカス
      setTimeout(() => {
        document.getElementById('sku-input')?.focus();
      }, 100);
      
      showNotification(`SKU「${window.tanafuriState.sku}」を再度スキャンしてください（残り: ${window.tanafuriState.remainingQuantity}個）`, 'info');
    }
    
    // 同じ仮棚番号で続行（新しいSKU用）
    function continueWithSameTana() {
      // 入力欄をクリア
      document.getElementById('sku-input').value = '';
      document.getElementById('new-tana-input').value = '';
      
      // STEP3を非表示、STEP2を表示
      document.getElementById('step3-area').classList.add('hidden');
      document.getElementById('step2-area').classList.remove('hidden');
      
      // プログレスステッパーを更新
      updateStepIndicator(2);
      
      // 残り個数バッジを非表示
      const remainingBadge = document.getElementById('remaining-quantity-badge');
      if (remainingBadge) remainingBadge.classList.add('hidden');
      document.getElementById('available-quantity-text').textContent = '';
      
      // 状態をSTEP2に戻す（現在の棚番号は保持、SKU情報はクリア）
      window.tanafuriState.step = 2;
      window.tanafuriState.sku = null;
      window.tanafuriState.quantity = null;
      window.tanafuriState.newTana = null;
      window.tanafuriState.availableQuantity = 0;
      window.tanafuriState.remainingQuantity = 0;
      window.tanafuriState.processedCount = 0;
      
      // SKU入力欄にフォーカス
      setTimeout(() => {
        document.getElementById('sku-input')?.focus();
      }, 100);
      
      showNotification(`棚番号「${window.tanafuriState.currentTana}」の次の商品をスキャンしてください`, 'info');
    }
    
    // 棚振りフォームをクリア
    function clearTanafuriForm() {

      const currentTanaInput = document.getElementById('current-tana-input');
      const skuInput = document.getElementById('sku-input');

      if (skuInput) skuInput.value = '';

      document.getElementById('step1-area').classList.remove('hidden');
      document.getElementById('step2-area').classList.add('hidden');
      document.getElementById('step3-area').classList.add('hidden');
      
      // プログレスステッパーをリセット
      updateStepIndicator(1);

      const remainingBadge = document.getElementById('remaining-quantity-badge');

      // 最初の入力欄にフォーカス
      setTimeout(() => {
        document.getElementById('current-tana-input')?.focus();
      }, 100);
    }
    
    // 仮棚内の在庫一覧を表示
    function displayTanaInventory(tanaNo, kenpinMatchedItems, trMatchedItems) {
      const section = document.getElementById('tana-inventory-section');
      const tbody = document.getElementById('tana-inventory-body');
      const label = document.getElementById('tana-inventory-label');
      const countBadge = document.getElementById('tana-inventory-count');
      
      if (!section || !tbody) return;
      
      // 棚番号ラベルを更新
      if (label) label.textContent = tanaNo;
      
      // 在庫データを集計
      const inventoryMap = new Map();
      
      // 検品データから集計
      kenpinMatchedItems.forEach(kenpin => {
        const key = kenpin.SKU;
        const registeredItem = registeredData.find(d => 
          d.SKU === kenpin.SKU && d.荷物番号 === kenpin.荷物番号
        );
        
        if (!inventoryMap.has(key)) {
          inventoryMap.set(key, {
            管理番号: registeredItem?.管理番号 || '',
            商品名: kenpin.商品名,
            SKU: kenpin.SKU,
            カラー: registeredItem?.カラー || '',
            サイズ: registeredItem?.サイズ || '',
            在庫数: 1,
            商品評価: registeredItem?.商品評価 || ''
          });
        } else {
          inventoryMap.get(key).在庫数++;
        }
      });
      
      // TRデータから集計
      trMatchedItems.forEach(trItem => {
        const key = trItem.SKU;
        if (!inventoryMap.has(key)) {
          inventoryMap.set(key, {
            管理番号: trItem.管理番号 || '',
            商品名: trItem.商品名,
            SKU: trItem.SKU,
            カラー: trItem.カラー || '',
            サイズ: trItem.サイズ || '',
            在庫数: parseInt(trItem.在庫数) || 1,
            商品評価: trItem.商品評価 || ''
          });
        } else {
          inventoryMap.get(key).在庫数 += (parseInt(trItem.在庫数) || 1);
        }
      });
      
      const inventoryData = Array.from(inventoryMap.values());
      
      // 件数バッジを更新
      if (countBadge) countBadge.textContent = `${inventoryData.length}件`;
      
      // テーブルを描画
      if (inventoryData.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="7" class="px-4 py-8 text-center text-gray-500">
              <i data-lucide="inbox" class="w-8 h-8 mx-auto mb-2 text-gray-300"></i>
              <p class="text-sm">この仮棚に在庫がありません</p>
            </td>
          </tr>
        `;
      } else {
        tbody.innerHTML = inventoryData.map(item => `
          <tr class="hover:bg-blue-50 transition-colors">
            <td class="px-4 py-2 text-gray-700">${item.管理番号 || '-'}</td>
            <td class="px-4 py-2 text-gray-900 font-medium">${item.商品名}</td>
            <td class="px-4 py-2 text-blue-600 font-mono">${item.SKU}</td>
            <td class="px-4 py-2 text-gray-600">${item.カラー || '-'}</td>
            <td class="px-4 py-2 text-gray-600">${item.サイズ || '-'}</td>
            <td class="px-4 py-2 font-semibold text-green-600">${item.在庫数}</td>
            <td class="px-4 py-2 text-gray-600">${item.商品評価 || '-'}</td>
          </tr>
        `).join('');
      }
      
      // セクションを表示
      section.classList.remove('hidden');
      
      // アイコンを再初期化
      lucide.createIcons();
    }
    
    // 棚振り後に仮棚在庫一覧を更新
    function updateTanaInventoryAfterMove(tanaNo) {
      // 該当する棚番号の在庫を再検索（棚振り済みでないもののみ）
      const matchedItems = kenpinData.filter(k => {
        if (k.ステータス !== '検品OK') return false;
        if (k.棚振り済み) return false;
        
        const registeredItem = registeredData.find(d => 
          d.SKU === k.SKU && d.荷物番号 === k.荷物番号
        );
        
        return k.棚番号 === tanaNo || registeredItem?.棚番号 === tanaNo;
      });
      
      // TRデータも検索
      let trMatchedItems = [];
      if (window.importedTRData && window.importedTRData.length > 0) {
        trMatchedItems = window.importedTRData.filter(tr => 
          isHanbaiMachiStatus(tr.在庫ステータス) && tr.棚番号 === tanaNo && !tr.棚振り済み
        );
      }
      
      // 在庫一覧を更新
      displayTanaInventory(tanaNo, matchedItems, trMatchedItems);
    }

    // 棚振り在庫一覧を表示
    function displayTanafuriList() {
      const tbody = document.getElementById('tanafuri-list-body');
      
      // 検品OKデータから在庫データを生成
      const kenpinOkData = kenpinData.filter(k => k.ステータス === '検品OK');
      
      // SKUと荷物番号の組み合わせでグループ化
      const zaikoMap = new Map();
      
      kenpinOkData.forEach(kenpin => {
        const key = `${kenpin.SKU}_${kenpin.荷物番号}`;
        
        // 棚振り済みのアイテムは表示しない
        if (kenpin.棚振り済み) {
          return;
        }
        
        // 登録データから棚番号を取得
        const registeredItem = registeredData.find(d => 
          d.SKU === kenpin.SKU && d.荷物番号 === kenpin.荷物番号
        );
        
        // 棚番号を決定(kenpinDataの棚番号を優先)
        const tanaNumber = kenpin.棚番号 || registeredItem?.棚番号 || '-';
        
        // 棚振り済みフラグのみで判定（在庫ステータスは全完了時のみ更新されるため）
        
        if (!zaikoMap.has(key)) {
          if (registeredItem) {
            zaikoMap.set(key, {
              管理番号: registeredItem.管理番号 || '',
              商品名: kenpin.商品名,
              商品番号: kenpin.商品番号 || registeredItem.商品番号,
              SKU: kenpin.SKU,
              カラー: registeredItem.カラー || '',
              サイズ: registeredItem.サイズ || '',
              オプション: registeredItem.オプション || '',
              商品評価: registeredItem.商品評価 || '',
              仕切価格: registeredItem.仕入価格 || '',
              在庫数: 1,
              引当数: 0,
              有効在庫数: 1,
              棚番号: tanaNumber,
              入荷日: registeredItem.入荷日 || registeredItem.登録日時 || '',
              出荷日: '',
              在庫ステータス: '販売待ち',
              備考: ''
            });
          }
        } else {
          zaikoMap.get(key).在庫数++;
          zaikoMap.get(key).有効在庫数++;
        }
      });
      
      // TRデータインポートで仮棚データをインポートしたデータを追加
      if (window.importedTRData && window.importedTRData.length > 0) {
        window.importedTRData.forEach(trItem => {
          if (isHanbaiMachiStatus(trItem.在庫ステータス) && !trItem.棚振り済み) {
            const key = `${trItem.SKU}_${trItem.荷物番号 || ''}`;
            if (!zaikoMap.has(key)) {
              zaikoMap.set(key, {
                管理番号: trItem.管理番号 || '',
                商品名: trItem.商品名,
                商品番号: trItem.商品番号 || '',
                SKU: trItem.SKU,
                カラー: trItem.カラー || '',
                サイズ: trItem.サイズ || '',
                オプション: trItem.オプション || '',
                商品評価: trItem.商品評価 || '',
                仕切価格: trItem.仕切価格 || '',
                在庫数: trItem.在庫数 || 1,
                引当数: trItem.引当数 || 0,
                有効在庫数: trItem.有効在庫数 || trItem.在庫数 || 1,
                棚番号: trItem.棚番号 || '-',
                入荷日: trItem.入荷日 || new Date().toISOString().slice(0, 19).replace('T', ' '),
                出荷日: trItem.出荷日 || '',
                在庫ステータス: String(trItem.在庫ステータス || '販売待ち').trim(),
                備考: trItem.備考 || ''
              });
            } else {
              zaikoMap.get(key).在庫数 += (trItem.在庫数 || 1);
              zaikoMap.get(key).有効在庫数 += (trItem.有効在庫数 || trItem.在庫数 || 1);
            }
          }
        });
      }
      
      const zaikoData = Array.from(zaikoMap.values());
      
      // 仮棚在庫がない場合
      if (zaikoData.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="17" class="px-6 py-12 text-center">
              <div class="flex flex-col items-center justify-center text-gray-500">
                <i data-lucide="inbox" class="w-16 h-16 mb-4 text-gray-400"></i>
                <p class="text-lg font-medium mb-2">仮棚在庫がありません</p>
                <p class="text-sm">すべての在庫が棚振り済みです</p>
              </div>
            </td>
          </tr>
        `;
        lucide.createIcons();
        return;
      }
      
      tbody.innerHTML = '';
      zaikoData.forEach(data => {
        const row = document.createElement('tr');
        row.className = 'hover:bg-gray-50 transition-colors duration-150';
        row.innerHTML = `
          <td class="px-6 py-4 text-sm text-gray-900">${data.管理番号 || '-'}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${data.商品名}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${data.商品番号 || '-'}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${data.SKU}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${data.カラー || '-'}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${data.サイズ || '-'}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${data.オプション || '-'}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${data.商品評価 || '-'}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${data.仕切価格 || '-'}</td>
          <td class="px-6 py-4 text-sm font-semibold text-green-600">${data.在庫数}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${data.引当数 || 0}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${data.有効在庫数 || 0}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${data.棚番号}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${data.入荷日 || '-'}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${data.出荷日 || '-'}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${data.在庫ステータス || '-'}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${data.備考 || '-'}</td>
        `;
        tbody.appendChild(row);
      });
    }

    // 棚卸データ初期化を実行
    function executeResetTanaoroshi() {
      const selected = document.querySelector('input[name="reset-warehouse"]:checked');
      if (!selected) return;
      const target = selected.value;

      const label = target === 'all' ? '全倉庫' : target + '倉庫';
      if (!confirm(`${label}の棚卸データを初期化します。\n棚卸実施、進捗、結果がリセットされます。\nよろしいですか？`)) {
        return;
      }

      closeResetTanaoroshiModal();

      if (target === 'all') {
        // 全倉庫を完全リセット
        window.tanaoroshiState = {
          selectedTanas: [],
          addedTanas: [],
          selectedWarehouse: null,
          expectedStock: {},
          actualStock: {},
          scannedSkus: new Set(),
          currentTana: null,
          currentTanaScannedSkus: [],
          completedTanas: [],
          errorSkus: [],
          notes: {},
          errorCauses: {}
        };
      } else {
        // 特定倉庫のみリセット
        // 対象倉庫の棚番号を取得
        const warehouseTanas = locationMasterData
          .filter(loc => loc.倉庫 === target)
          .map(loc => loc.棚番号);

        const state = window.tanaoroshiState;
        if (state) {
          // selectedTanas から対象倉庫の棚番号を除外
          state.selectedTanas = (state.selectedTanas || []).filter(t => !warehouseTanas.includes(t));
          // addedTanas から対象倉庫の棚番号を除外
          state.addedTanas = (state.addedTanas || []).filter(t => !warehouseTanas.includes(t));
          // completedTanas から対象倉庫の棚番号を除外
          state.completedTanas = (state.completedTanas || []).filter(t => !warehouseTanas.includes(t));

          // expectedStock から対象倉庫のSKUを除外
          if (state.expectedStock) {
            Object.keys(state.expectedStock).forEach(sku => {
              if (warehouseTanas.includes(state.expectedStock[sku].棚番号)) {
                delete state.expectedStock[sku];
              }
            });
          }
          // actualStock から対象倉庫のSKUを除外
          if (state.actualStock) {
            Object.keys(state.actualStock).forEach(sku => {
              const stockTana = state.actualStock[sku]?.棚番号;
              if (stockTana && warehouseTanas.includes(stockTana)) {
                delete state.actualStock[sku];
              }
            });
          }
          // notes から対象倉庫のSKUを除外
          if (state.notes) {
            Object.keys(state.notes).forEach(sku => {
              if (state.expectedStock && !state.expectedStock[sku]) {
                delete state.notes[sku];
              }
            });
          }
          // errorCauses から対象倉庫のSKUを除外
          if (state.errorCauses) {
            Object.keys(state.errorCauses).forEach(sku => {
              if (state.expectedStock && !state.expectedStock[sku]) {
                delete state.errorCauses[sku];
              }
            });
          }
          // currentTana が対象倉庫の棚の場合はクリア
          if (state.currentTana && warehouseTanas.includes(state.currentTana)) {
            state.currentTana = null;
            state.currentTanaScannedSkus = [];
          }
          // selectedWarehouse が対象倉庫の場合はクリア
          if (state.selectedWarehouse === target) {
            state.selectedWarehouse = null;
          }
        }
      }

      // 棚卸データ設定画面を再表示
      showTanaoroshiDataCreate();

      showNotification(`${label}の棚卸データを初期化しました`, 'success');
    }
