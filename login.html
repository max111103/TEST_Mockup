<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WMS - ログイン</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .login-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #60a5fa 100%);
        }

        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }

        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .btn-login {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="login-bg min-h-screen flex items-center justify-center p-4">

    <div class="login-card rounded-2xl shadow-2xl p-8 w-full max-w-md fade-in">
        <!-- ロゴ・タイトル -->
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl mb-4 shadow-lg">
                <i data-lucide="boxes" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">WMS</h1>
            <p class="text-gray-500 mt-2">倉庫管理システム</p>
        </div>

        <!-- ログインフォーム -->
        <form id="login-form" onsubmit="handleLogin(event)">
            <!-- アカウントID -->
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i data-lucide="building-2" class="w-4 h-4 inline mr-1"></i>
                    アカウントID
                </label>
                <input type="text" id="account-id" placeholder="アカウントIDを入力"
                    class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 input-focus transition-all duration-200 text-gray-800"
                    required autocomplete="organization">
            </div>

            <!-- ユーザー名 -->
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i data-lucide="user" class="w-4 h-4 inline mr-1"></i>
                    ユーザー名
                </label>
                <input type="text" id="login-id" placeholder="ユーザー名を入力"
                    class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 input-focus transition-all duration-200 text-gray-800"
                    required autocomplete="username">
            </div>

            <!-- パスワード -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i data-lucide="lock" class="w-4 h-4 inline mr-1"></i>
                    パスワード
                </label>
                <div class="relative">
                    <input type="password" id="password" placeholder="パスワードを入力"
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 input-focus transition-all duration-200 text-gray-800 pr-12"
                        required autocomplete="current-password">
                    <button type="button" onclick="togglePasswordVisibility()"
                        class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
                        <i data-lucide="eye" id="eye-icon" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- エラーメッセージ -->
            <div id="error-message"
                class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm flex items-center gap-2">
                <i data-lucide="alert-circle" class="w-4 h-4"></i>
                <span id="error-text">アカウントID、ユーザー名、またはパスワードが正しくありません</span>
            </div>

            <!-- ログインボタン -->
            <button type="submit" id="login-btn"
                class="w-full btn-login text-white font-semibold py-3 px-6 rounded-xl flex items-center justify-center gap-2">
                <i data-lucide="log-in" class="w-5 h-5"></i>
                <span>ログイン</span>
            </button>
        </form>

        <!-- フッター -->
        <div class="mt-8 pt-6 border-t border-gray-200 text-center">
            <p class="text-xs text-gray-400">© 2025 WMS - Warehouse Management System</p>
        </div>
    </div>

    <script>
        // Lucideアイコンを初期化
        lucide.createIcons();

        // 認証情報（複数アカウント対応）
        const VALID_ACCOUNTS = [
            { accountId: 'PCI', loginId: 'admin', password: 'wmsmock', supplierKey: 'PCI', name: 'ピーシーアイ株式会社' },
            { accountId: 'KYT', loginId: 'admin', password: 'wmsmock', supplierKey: 'CORDAMOTO', name: '株式会社CORDA・MOTO' },
        ];

        // パスワード表示切り替え
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passwordInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        // ログイン処理
        function handleLogin(event) {
            event.preventDefault();

            const accountId = document.getElementById('account-id').value.trim();
            const loginId = document.getElementById('login-id').value.trim();
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');
            const loginForm = document.getElementById('login-form');
            const loginBtn = document.getElementById('login-btn');

            // ボタンをローディング状態に
            loginBtn.disabled = true;
            loginBtn.innerHTML = `
        <svg class="animate-spin w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>認証中...</span>
      `;

            // 認証処理（少し遅延を入れてリアルな動作に）
            setTimeout(() => {
                const matchedAccount = VALID_ACCOUNTS.find(a =>
                    a.accountId.toLowerCase() === accountId.toLowerCase() &&
                    a.loginId === loginId &&
                    a.password === password
                );

                if (matchedAccount) {
                    // 認証成功
                    errorMessage.classList.add('hidden');

                    // セッション情報を保存
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('accountId', matchedAccount.accountId);
                    sessionStorage.setItem('supplierKey', matchedAccount.supplierKey);
                    sessionStorage.setItem('accountName', matchedAccount.name);
                    sessionStorage.setItem('userId', loginId);
                    sessionStorage.setItem('loginTime', new Date().toISOString());

                    // 成功メッセージを表示
                    loginBtn.classList.remove('btn-login');
                    loginBtn.classList.add('bg-green-500');
                    loginBtn.innerHTML = `
            <i data-lucide="check-circle" class="w-5 h-5"></i>
            <span>ログイン成功</span>
          `;
                    lucide.createIcons();

                    // メイン画面に遷移
                    setTimeout(() => {
                        window.location.href = 'PCI_Mock.html';
                    }, 800);

                } else {
                    // 認証失敗
                    errorMessage.classList.remove('hidden');
                    loginForm.classList.add('shake');

                    // ボタンを元に戻す
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = `
            <i data-lucide="log-in" class="w-5 h-5"></i>
            <span>ログイン</span>
          `;
                    lucide.createIcons();

                    // シェイクアニメーションを削除
                    setTimeout(() => {
                        loginForm.classList.remove('shake');
                    }, 500);

                    // パスワードをクリア
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            }, 1000);
        }

        // Enterキーで次のフィールドにフォーカス
        document.getElementById('account-id').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('login-id').focus();
            }
        });
        document.getElementById('login-id').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('password').focus();
            }
        });

        // ページ読み込み時にアカウントIDにフォーカス
        window.addEventListener('load', () => {
            document.getElementById('account-id').focus();
        });
    </script>

</body>

</html>
